# Standard label schema for attestplane/attestplane.
# Apply via maintainer's labels-sync workflow (separate work package).
# This file is the canonical source.

- name: "good first issue"
  color: "7057ff"
  description: "Newcomer-friendly. See docs/contributor/first-pr-walkthrough.md"
- name: "help wanted"
  color: "008672"
  description: "Open to community implementation"
- name: "triage"
  color: "fbca04"
