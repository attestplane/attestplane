- name: "type:enhancement"
  color: "a2eeef"
- name: "type:release"
  color: "5319e7"
- name: "area:python-sdk"
  color: "c5def5"
- name: "area:ts-sdk"
  color: "c5def5"
- name: "area:verifier"
  color: "c5def5"
- name: "area:docs"
  color: "c5def5"
- name: "area:ci"
  color: "c5def5"
- name: "risk:low"
  color: "0e8a16"
- name: "risk:medium"
  color: "fbca04"
- name: "risk:high"
  color: "d93f0b"
- name: "needs-adr"
  color: "5319e7"
  description: "Requires an ADR before implementation"
- name: "stale"
  color: "cccccc"
