name: sbom

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "sdk/python/**"
      - ".github/workflows/sbom.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sbom-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

defaults:
  run:
    working-directory: sdk/python

jobs:
  cyclonedx:
    name: Generate CycloneDX SBOM (sdk/python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: sdk/python/pyproject.toml

      - name: Install package + dev extras
        run: |
          uv venv --python 3.12 .venv
          uv pip install -e '.[dev]'

      - name: Generate CycloneDX SBOM (JSON + XML)
        run: |
          .venv/bin/cyclonedx-py environment .venv \
            --of JSON \
            -o attestplane-python.cdx.json
          .venv/bin/cyclonedx-py environment .venv \
            --of XML \
            -o attestplane-python.cdx.xml

      - name: Validate SBOM spec compliance
        run: |
          .venv/bin/python -c "
          import json
          d = json.load(open('attestplane-python.cdx.json'))
          assert d['bomFormat'] == 'CycloneDX'
          assert d['specVersion'].startswith('1.')
          assert len(d.get('components', [])) > 0
          print(f\"spec={d['specVersion']}  components={len(d['components'])}\")
          "

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: attestplane-python-sbom-${{ github.sha }}
          path: |
            sdk/python/attestplane-python.cdx.json
            sdk/python/attestplane-python.cdx.xml
          retention-days: 90
          if-no-files-found: error
