name: reimplementate-autodev-pr

# autodev-train Stage 2b: Auto-retry when AI review requests changes.
# Triggers when any PR review is submitted with state CHANGES_REQUESTED
# on a PR carrying the 'autodev-pr' label.
# Re-runs Codex CLI with the review feedback as context, pushes a fix commit,
# which re-triggers review-autodev-pr.yml automatically.
# After MAX_RETRIES attempts, escalates to 'needs-human' label.

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: autodev-reimplement-${{ github.event.pull_request.number }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  AUTODEV_BOT_NAME: "autodev-bot"
  AUTODEV_BOT_EMAIL: "258170091+merchloubna70-dot@users.noreply.github.com"
  MAX_RETRIES: "3"
  https_proxy: "http://127.0.0.1:7897"
  http_proxy: "http://127.0.0.1:7897"

jobs:
  reimplement:
    name: Re-implement PR #${{ github.event.pull_request.number }}
    if: >-
      github.event.review.state == 'changes_requested' &&
      contains(join(github.event.pull_request.labels.*.name, ','), 'autodev-pr')
    runs-on: [self-hosted, macOS, ARM64, opus-plan]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "$AUTODEV_BOT_NAME"
          git config user.email "$AUTODEV_BOT_EMAIL"

      - name: Ensure needs-human label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "needs-human" \
            --description "autodev-train max retries exceeded — human review required" \
            --color "d93f0b" --force

      - name: Count autodev retry commits on branch
        id: retries
        run: |
          set -euo pipefail
          # Count commits authored by autodev-bot beyond main on this branch
          RETRY_COUNT=$(git log origin/main..HEAD \
            --author="${AUTODEV_BOT_NAME}" --oneline | wc -l | tr -d ' ')
          echo "count=${RETRY_COUNT}" >> "$GITHUB_OUTPUT"
          if [ "${RETRY_COUNT}" -ge "${MAX_RETRIES}" ]; then
            echo "exceeded=true"  >> "$GITHUB_OUTPUT"
          else
            echo "exceeded=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Retry count: ${RETRY_COUNT} / ${MAX_RETRIES}"

      # ── Path A: max retries exceeded ────────────────────────────────────
      - name: Escalate to needs-human
        if: steps.retries.outputs.exceeded == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          RETRY_COUNT="${{ steps.retries.outputs.count }}"
          gh pr edit "${{ github.event.pull_request.number }}" \
            --add-label "needs-human"
          printf '%s\n\n%s\n\n%s\n%s\n%s\n%s\n\n%s\n' \
            "⛔ **autodev-train: 已达最大重试次数（${RETRY_COUNT}/${MAX_RETRIES}）**" \
            "自动实现流水线无法在 ${MAX_RETRIES} 次尝试内通过 AI 审查，已停止自动重试。" \
            "**建议操作：**" \
            "1. 查看上方历次 \`autodev-review\` 评论中的审查意见" \
            "2. 手动修改代码并推送到此分支（推送后 review 会自动重新运行）" \
            "3. 或关闭此 PR，优化 Issue 描述后重新触发流水线" \
            "*已添加 \`needs-human\` 标签以便筛选。*" \
            > /tmp/escalate_body.txt
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "$(cat /tmp/escalate_body.txt)"
          echo "Escalated to needs-human after ${RETRY_COUNT} retries."

      # ── Path B: retry within limit ───────────────────────────────────────
      - name: Fetch review feedback and issue context
        if: steps.retries.outputs.exceeded == 'false'
        id: context
        env:
          GH_TOKEN: ${{ github.token }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          PR="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          # Latest REQUEST_CHANGES review body from autodev-review bot
          REVIEW_BODY=$(gh api \
            "repos/${REPO}/pulls/${PR}/reviews" \
            --jq '[.[] | select(.state == "CHANGES_REQUESTED")] | last | .body // "（审查意见为空）"')

          # Linked issue from PR body ("Closes #N")
          PR_BODY=$(gh pr view "$PR" --json body -q .body)
          ISSUE_NUMBER=$(printf '%s' "$PR_BODY" \
            | grep -oE 'Closes #[0-9]+' | grep -oE '[0-9]+' | head -1 || true)

          if [ -n "$ISSUE_NUMBER" ]; then
            ISSUE_BODY=$(gh issue view "$ISSUE_NUMBER" --json body -q .body)
            ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --json title -q .title)
          else
            ISSUE_BODY="（未找到关联 Issue）"
            ISSUE_TITLE="${PR_TITLE}"
          fi

          {
            printf 'review_body<<__EOF_REVIEW__\n'
            printf '%s\n' "$REVIEW_BODY"
            printf '__EOF_REVIEW__\n'
            printf 'issue_body<<__EOF_ISSUE__\n'
            printf '%s\n' "$ISSUE_BODY"
            printf '__EOF_ISSUE__\n'
            printf 'issue_title<<__EOF_TITLE__\n'
            printf '%s\n' "$ISSUE_TITLE"
            printf '__EOF_TITLE__\n'
          } >> "$GITHUB_OUTPUT"

      - name: Post retry progress comment
        if: steps.retries.outputs.exceeded == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RETRY_NUM=$(( ${{ steps.retries.outputs.count }} + 1 ))
          printf '%s\n\n%s\n' \
            "🔄 **autodev-train: 正在重新实现（第 ${RETRY_NUM}/${MAX_RETRIES} 次）**" \
            "已收到审查意见，Codex CLI 正在修复中，请稍候..." \
            > /tmp/retry_progress_body.txt
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "$(cat /tmp/retry_progress_body.txt)"

      - name: Re-run Codex with review feedback
        if: steps.retries.outputs.exceeded == 'false'
        env:
          ISSUE_TITLE: ${{ steps.context.outputs.issue_title }}
          ISSUE_BODY: ${{ steps.context.outputs.issue_body }}
          REVIEW_BODY: ${{ steps.context.outputs.review_body }}
        run: |
          set -euo pipefail
          RETRY_NUM=$(( ${{ steps.retries.outputs.count }} + 1 ))
          {
            printf '按照 AGENTS.md 和项目规范修复以下代码审查意见。这是第 %s 次重试。\n\n' "${RETRY_NUM}"
            printf '## 原始任务标题\n%s\n\n' "${ISSUE_TITLE}"
            printf '## 原始任务描述\n%s\n\n' "${ISSUE_BODY}"
            printf '## 审查意见（必须全部修复）\n%s\n\n' "${REVIEW_BODY}"
            printf '%s\n' "## 修复要求（严格遵守）"
            printf '%s\n' "1. 逐条修复上方所有 ❌ 标注的问题，✅ 项保持不变"
            printf '%s\n' "2. 不得修改 .github/workflows/、scripts/release/、CHANGELOG.md"
            printf '%s\n' "3. 新建文件必须在文件头部包含 REUSE 合规头："
            printf '%s\n' "   - SPDX-License-Identifier: Apache-2.0"
            printf '%s\n' "   - SPDX-FileCopyrightText: 2026 Attestplane Contributors"
            printf '%s\n' "4. 不得执行 git push、git tag、git merge、npm publish、twine upload"
            printf '%s\n' "5. 只修改解决审查意见所需的最小文件集"
          } > /tmp/autodev_reimplement_prompt.txt
          codex exec --sandbox workspace-write "$(cat /tmp/autodev_reimplement_prompt.txt)"

      - name: Commit and push fix
        if: steps.retries.outputs.exceeded == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git add -A
          RETRY_NUM=$(( ${{ steps.retries.outputs.count }} + 1 ))

          PR_NUM="${{ github.event.pull_request.number }}"
          if git diff --staged --quiet; then
            printf '%s\n\n%s\n\n%s\n' \
              "⚠️ autodev-train: 第 ${RETRY_NUM} 次重实现未产生任何文件变更。" \
              "可能原因：Codex 认为现有代码已满足审查要求，或无法理解具体意见。" \
              "如果审查仍未通过，请人工检查审查意见并手动修复。" \
              > /tmp/no_changes_body.txt
            gh pr comment "${PR_NUM}" --body "$(cat /tmp/no_changes_body.txt)"
          else
            printf '%s\n\nRetry: %s/%s\nPR: #%s\n' \
              "fix: autodev retry ${RETRY_NUM} -- address review feedback" \
              "${RETRY_NUM}" "${MAX_RETRIES}" "${PR_NUM}" \
              > /tmp/commit_msg.txt
            git commit --signoff --file /tmp/commit_msg.txt
            git push origin HEAD --force-with-lease
            echo "Fix committed and pushed (retry ${RETRY_NUM}). review-autodev-pr.yml will re-trigger."
          fi
