name: release-cd

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish, e.g. v0.8.0-rc.1 or v0.8.0'
        required: true
        type: string
      channel:
        description: 'Release channel / npm dist-tag'
        required: true
        default: 'rc'
        type: choice
        options:
          - alpha
          - beta
          - rc
          - latest
      dry_run:
        description: 'Validate and build only; do not publish'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-cd-${{ inputs.release_tag }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    name: Validate release CD policy
    runs-on: ubuntu-latest
    outputs:
      python_version: ${{ steps.policy.outputs.python_version }}
      npm_version: ${{ steps.policy.outputs.npm_version }}
      npm_dist_tag: ${{ steps.policy.outputs.npm_dist_tag }}
      is_prerelease: ${{ steps.policy.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Confirm release tag is immutable and reachable
        run: |
          set -euo pipefail
          git fetch --tags --force
          git rev-list -n 1 "${{ inputs.release_tag }}"

      - name: Validate package versions and channel policy
        id: policy
        run: |
          set -euo pipefail
          python scripts/release/validate_release_cd.py \
            --release-tag "${{ inputs.release_tag }}" \
            --channel "${{ inputs.channel }}" \
            --repo-root "$PWD" \
            --metadata-ref "${{ inputs.release_tag }}"

      - name: Release CD summary
        run: |
          {
            echo "## Release CD preflight"
            echo ""
            echo "- tag: \`${{ inputs.release_tag }}\`"
            echo "- dry_run: \`${{ inputs.dry_run }}\`"
            echo "- Python: \`${{ steps.policy.outputs.python_version }}\`"
            echo "- npm: \`${{ steps.policy.outputs.npm_version }}\`"
            echo "- npm dist-tag: \`${{ steps.policy.outputs.npm_dist_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  python-gate:
    name: Python release gate
    needs: validate
    uses: ./.github/workflows/publish-python.yml
    with:
      target: testpypi
      dry_run: true
      release_ref: ${{ inputs.release_tag }}

  typescript-gate:
    name: TypeScript release gate
    needs: validate
    uses: ./.github/workflows/publish-typescript.yml
    with:
      tag: ${{ needs.validate.outputs.npm_dist_tag }}
      dry_run: true
      release_ref: ${{ inputs.release_tag }}
    secrets: inherit

  publish-python:
    name: Publish Python package
    needs:
      - validate
      - python-gate
      - typescript-gate
    if: inputs.dry_run != true
    uses: ./.github/workflows/publish-python.yml
    with:
      target: pypi
      dry_run: false
      release_ref: ${{ inputs.release_tag }}

  publish-typescript:
    name: Publish TypeScript package
    needs:
      - validate
      - python-gate
      - typescript-gate
    if: inputs.dry_run != true
    uses: ./.github/workflows/publish-typescript.yml
    with:
      tag: ${{ needs.validate.outputs.npm_dist_tag }}
      dry_run: false
      release_ref: ${{ inputs.release_tag }}
    secrets: inherit

  verify-registries:
    name: Verify PyPI and npm registries
    needs:
      - validate
      - publish-python
      - publish-typescript
    if: inputs.dry_run != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.release_tag }}

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
          package-manager-cache: false

      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6
        with:
          python-version: "3.12"

      - name: Verify registry visibility
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import time
          import urllib.error
          import urllib.request

          expected = "${{ needs.validate.outputs.python_version }}"
          url = f"https://pypi.org/pypi/attestplane/{expected}/json"
          for attempt in range(1, 31):
              try:
                  with urllib.request.urlopen(url, timeout=15) as response:
                      data = json.load(response)
                  actual = data["info"]["version"]
                  if actual == expected:
                      print(f"PyPI visible: {actual}")
                      break
                  raise SystemExit(f"PyPI version mismatch: expected {expected}, got {actual}")
              except urllib.error.HTTPError as exc:
                  if exc.code != 404 or attempt == 30:
                      raise
                  time.sleep(20)
          else:
              raise SystemExit(f"PyPI version {expected} not visible")
          PY

          expected_npm="${{ needs.validate.outputs.npm_version }}"
          actual_npm="$(npm view "@attestplane/attestplane@${expected_npm}" version)"
          test "$actual_npm" = "$expected_npm"

          expected_tag="${{ needs.validate.outputs.npm_dist_tag }}"
          dist_tag_version="$(npm view @attestplane/attestplane "dist-tags.${expected_tag}")"
          test "$dist_tag_version" = "$expected_npm"
          echo "npm visible: ${actual_npm} (${expected_tag})"
