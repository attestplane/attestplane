name: review-autodev-pr

# autodev-train Stage 2: AI code review for autodev-generated PRs.
# Triggers when an 'autodev-pr' PR is opened, labeled, or updated.
# Calls OpenRouter → Claude 3.5 Sonnet to review the diff.
# Posts a formal GitHub PR review: APPROVE or REQUEST_CHANGES.
# On APPROVE, adds 'review-passed' label → triggers Stage 3 auto-merge.

on:
  pull_request:
    types: [labeled, synchronize, opened]

permissions:
  contents: read
  pull-requests: write
  issues: read

concurrency:
  group: autodev-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  review:
    name: AI review PR #${{ github.event.pull_request.number }}
    if: contains(join(github.event.pull_request.labels.*.name, ','), 'autodev-pr')
    runs-on: [self-hosted, macOS, ARM64, opus-plan]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch PR diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh pr diff "${{ github.event.pull_request.number }}" > /tmp/autodev_pr.diff
          echo "Diff size: $(wc -c < /tmp/autodev_pr.diff) bytes"

      - name: Fetch linked issue body
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR_BODY=$(gh pr view "${{ github.event.pull_request.number }}" --json body -q .body)
          ISSUE_NUMBER=$(printf '%s' "$PR_BODY" \
            | grep -oE 'Closes #[0-9]+' | grep -oE '[0-9]+' | head -1 || true)
          if [ -n "$ISSUE_NUMBER" ]; then
            ISSUE_BODY=$(gh issue view "$ISSUE_NUMBER" --json body -q .body)
            echo "number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
          else
            ISSUE_BODY="（未找到关联 Issue）"
            echo "number=" >> "$GITHUB_OUTPUT"
          fi
          {
            printf 'body<<__EOF_ISSUE__\n'
            printf '%s\n' "$ISSUE_BODY"
            printf '__EOF_ISSUE__\n'
          } >> "$GITHUB_OUTPUT"

      - name: Run AI review via DeepSeek v4.0 Pro
        id: ai_review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ISSUE_BODY: ${{ steps.issue.outputs.body }}
        run: |
          set -euo pipefail
          python3 /dev/stdin <<'PYEOF'
          import os, json, urllib.request, sys

          api_key  = os.environ["DEEPSEEK_API_KEY"]
          issue_body = os.environ.get("ISSUE_BODY", "（无关联 Issue）")

          with open("/tmp/autodev_pr.diff") as f:
              diff = f.read()

          # Truncate to stay within context limits
          if len(diff) > 40_000:
              diff = diff[:40_000] + "\n\n[... diff truncated at 40 000 chars ...]"

          prompt = f"""你是 Attestplane 项目的自动化代码审查员。

## 任务来源（planned-task Issue 描述）
{issue_body}

## PR Diff
```diff
{diff}
```

## 审查标准（逐项检查）
1. **实现完整性** — 代码是否覆盖了 Issue 中所有验收标准？
2. **REUSE 合规** — 新增文件是否包含 SPDX-License-Identifier 和 SPDX-FileCopyrightText 头部？
3. **代码正确性** — 逻辑是否正确，有无明显 bug 或边界条件遗漏？
4. **安全性** — 无硬编码密钥，无命令注入，无路径穿越。
5. **项目规范** — 未修改 .github/workflows/、scripts/release/、CHANGELOG.md。

## 输出格式（严格遵守）
第一行必须且只能是以下两个词之一（不加任何标点或空格）：
APPROVE
或
REQUEST_CHANGES

第二行起输出详细审查说明（中文），通过项用 ✅，不通过项用 ❌ 并给出修复建议。"""

          payload = json.dumps({
              "model": "deepseek-v4-pro",
              "messages": [{"role": "user", "content": prompt}],
              "max_tokens": 2048,
          }).encode()

          req = urllib.request.Request(
              "https://api.deepseek.com/v1/chat/completions",
              data=payload,
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json",
              },
          )

          try:
              with urllib.request.urlopen(req, timeout=120) as resp:
                  result = json.loads(resp.read())
                  content = result["choices"][0]["message"]["content"].strip()
          except Exception as exc:
              # Safe fallback: never silently approve on API error
              content = f"REQUEST_CHANGES\n\n❌ AI review API 调用失败: {exc}\n\n请重新运行 review 工作流或人工审查。"

          with open("/tmp/review_output.txt", "w") as f:
              f.write(content)

          # Extract decision (first line)
          first_line = content.splitlines()[0].strip()
          decision = first_line if first_line in ("APPROVE", "REQUEST_CHANGES") else "REQUEST_CHANGES"
          print(f"DECISION={decision}")
          PYEOF

          # Read decision into step output
          DECISION=$(python3 -c "
          with open('/tmp/review_output.txt') as f:
              line = f.readline().strip()
          print(line if line in ('APPROVE','REQUEST_CHANGES') else 'REQUEST_CHANGES')
          ")
          echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"
          echo "Review decision: ${DECISION}"

      - name: Post approval review
        if: steps.ai_review.outputs.decision == 'APPROVE'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Body = everything after the first line
          BODY=$(tail -n +2 /tmp/review_output.txt)
          gh pr review "${{ github.event.pull_request.number }}" \
            --approve \
            --body "### autodev-review: APPROVE ✅

${BODY}

---
*Reviewed by autodev-train · DeepSeek v4.0 Pro*"
          gh pr edit "${{ github.event.pull_request.number }}" \
            --add-label "review-passed"

      - name: Post request-changes review
        if: steps.ai_review.outputs.decision == 'REQUEST_CHANGES'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BODY=$(tail -n +2 /tmp/review_output.txt)
          gh pr review "${{ github.event.pull_request.number }}" \
            --request-changes \
            --body "### autodev-review: REQUEST_CHANGES ❌

${BODY}

---
*Reviewed by autodev-train · DeepSeek v4.0 Pro*

**Retry:** 修复上述问题后向此分支推送新 commit，review 将自动重新运行。"
