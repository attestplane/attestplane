name: review-autodev-pr

# autodev-train Stage 2: AI code review for autodev-generated PRs.
# Triggers when an 'autodev-pr' PR is opened, labeled, or updated.
# Calls OpenRouter → Claude 3.5 Sonnet to review the diff.
# Posts a formal GitHub PR review: APPROVE or REQUEST_CHANGES.
# On APPROVE, adds 'review-passed' label → triggers Stage 3 auto-merge.

on:
  pull_request:
    types: [labeled, synchronize, opened]

permissions:
  contents: read
  pull-requests: write
  issues: read

concurrency:
  group: autodev-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  https_proxy: "http://127.0.0.1:7897"
  http_proxy: "http://127.0.0.1:7897"

jobs:
  review:
    name: AI review PR #${{ github.event.pull_request.number }}
    if: contains(join(github.event.pull_request.labels.*.name, ','), 'autodev-pr')
    runs-on: [self-hosted, macOS, ARM64, opus-plan]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch PR diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh pr diff "${{ github.event.pull_request.number }}" > /tmp/autodev_pr.diff
          echo "Diff size: $(wc -c < /tmp/autodev_pr.diff) bytes"

      - name: Fetch linked issue body
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR_BODY=$(gh pr view "${{ github.event.pull_request.number }}" --json body -q .body)
          ISSUE_NUMBER=$(printf '%s' "$PR_BODY" \
            | grep -oE 'Closes #[0-9]+' | grep -oE '[0-9]+' | head -1 || true)
          if [ -n "$ISSUE_NUMBER" ]; then
            ISSUE_BODY=$(gh issue view "$ISSUE_NUMBER" --json body -q .body)
            echo "number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
          else
            ISSUE_BODY="（未找到关联 Issue）"
            echo "number=" >> "$GITHUB_OUTPUT"
          fi
          {
            printf 'body<<__EOF_ISSUE__\n'
            printf '%s\n' "$ISSUE_BODY"
            printf '__EOF_ISSUE__\n'
          } >> "$GITHUB_OUTPUT"

      - name: Run AI review via DeepSeek v4.0 Pro
        id: ai_review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ISSUE_BODY: ${{ steps.issue.outputs.body }}
        run: |
          set -euo pipefail
          python3 scripts/autodev/review.py
          DECISION=$(python3 -c "import sys; line=open('/tmp/review_output.txt').readline().strip(); print(line if line in ('APPROVE','REQUEST_CHANGES') else 'REQUEST_CHANGES')")
          echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"
          echo "Review decision: ${DECISION}"

      - name: Post approval review
        if: steps.ai_review.outputs.decision == 'APPROVE'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR="${{ github.event.pull_request.number }}"
          BODY=$(tail -n +2 /tmp/review_output.txt)
          printf '%s\n\n%s\n\n%s\n%s\n' \
            "### autodev-review: APPROVE" \
            "${BODY}" \
            "---" \
            "*Reviewed by autodev-train - DeepSeek v4.0 Pro*" \
            > /tmp/approve_body.txt
          gh pr review "${PR}" --approve --body-file /tmp/approve_body.txt
          gh pr edit "${PR}" --add-label "review-passed"

      - name: Post request-changes review
        if: steps.ai_review.outputs.decision == 'REQUEST_CHANGES'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR="${{ github.event.pull_request.number }}"
          BODY=$(tail -n +2 /tmp/review_output.txt)
          printf '%s\n\n%s\n\n%s\n%s\n\n%s\n' \
            "### autodev-review: REQUEST_CHANGES" \
            "${BODY}" \
            "---" \
            "*Reviewed by autodev-train - DeepSeek v4.0 Pro*" \
            "Retry: push a new commit to this branch; review will re-run automatically." \
            > /tmp/rc_body.txt
          gh pr review "${PR}" --request-changes --body-file /tmp/rc_body.txt
