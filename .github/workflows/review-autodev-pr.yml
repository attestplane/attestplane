name: review-autodev-pr

# autodev-train Stage 2: AI code review for autodev-generated PRs.
# Triggers when an 'autodev-pr' PR is opened, labeled, or updated.
# Calls Qwen Code CLI (qwen -p) with DeepSeek v4.0 Pro as backend.
# Posts a formal GitHub PR review: APPROVE or REQUEST_CHANGES.
# On APPROVE, adds 'review-passed' label → triggers Stage 3 auto-merge.

on:
  pull_request:
    types: [labeled, synchronize, opened]

permissions:
  contents: read
  pull-requests: write
  issues: read

concurrency:
  group: autodev-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  https_proxy: "http://127.0.0.1:7897"
  http_proxy: "http://127.0.0.1:7897"

jobs:
  review:
    name: AI review PR #${{ github.event.pull_request.number }}
    if: contains(join(github.event.pull_request.labels.*.name, ','), 'autodev-pr')
    runs-on: [self-hosted, macOS, ARM64, opus-plan]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch PR diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh pr diff "${{ github.event.pull_request.number }}" > /tmp/autodev_pr.diff
          echo "Diff size: $(wc -c < /tmp/autodev_pr.diff) bytes"

      - name: Fetch linked issue body
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR_BODY=$(gh pr view "${{ github.event.pull_request.number }}" --json body -q .body)
          ISSUE_NUMBER=$(printf '%s' "$PR_BODY" \
            | grep -oE 'Closes #[0-9]+' | grep -oE '[0-9]+' | head -1 || true)
          if [ -n "$ISSUE_NUMBER" ]; then
            ISSUE_BODY=$(gh issue view "$ISSUE_NUMBER" --json body -q .body)
            echo "number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
          else
            ISSUE_BODY="（未找到关联 Issue）"
            echo "number=" >> "$GITHUB_OUTPUT"
          fi
          {
            printf 'body<<__EOF_ISSUE__\n'
            printf '%s\n' "$ISSUE_BODY"
            printf '__EOF_ISSUE__\n'
          } >> "$GITHUB_OUTPUT"

      - name: Run AI review via Qwen Code + DeepSeek v4.0 Pro
        id: ai_review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ISSUE_BODY: ${{ steps.issue.outputs.body }}
        run: |
          set -euo pipefail
          {
            printf '你是 Attestplane 项目的自动化代码审查员。\n\n'
            printf '## 任务来源（planned-task Issue 描述）\n%s\n\n' "${ISSUE_BODY}"
            printf '## PR Diff\n```diff\n'
            cat /tmp/autodev_pr.diff
            printf '\n```\n\n'
            printf '## 审查标准（逐项检查）\n'
            printf '1. **实现完整性** — 代码是否覆盖了 Issue 中所有验收标准？\n'
            printf '2. **REUSE 合规** — 新增文件是否包含 SPDX-License-Identifier 和 SPDX-FileCopyrightText 头部？\n'
            printf '3. **代码正确性** — 逻辑是否正确，有无明显 bug 或边界条件遗漏？\n'
            printf '4. **安全性** — 无硬编码密钥，无命令注入，无路径穿越。\n'
            printf '5. **项目规范** — 未修改 .github/workflows/、CHANGELOG.md；scripts/release/ 下的文件仅当 Issue 明确要求时可改。\n\n'
            printf '## 输出格式（严格遵守）\n'
            printf '第一行必须且只能是以下两个词之一（不加任何标点或空格）：\n'
            printf 'APPROVE\n或\nREQUEST_CHANGES\n\n'
            printf '第二行起输出详细审查说明（中文），通过项用 ✅，不通过项用 ❌ 并给出修复建议。\n'
          } > /tmp/review_prompt.txt

          qwen "$(cat /tmp/review_prompt.txt)" \
            --openai-api-key "${DEEPSEEK_API_KEY}" \
            --openai-base-url "https://api.deepseek.com/v1" \
            --auth-type openai \
            --model deepseek-v4-pro \
            --approval-mode yolo \
            --output-format text \
            --max-session-turns 1 \
            --channel CI \
            --bare \
            > /tmp/review_output.txt 2>/tmp/review_stderr.txt || {
              printf 'REQUEST_CHANGES\n\n❌ Qwen Code 审查调用失败。stderr:\n' > /tmp/review_output.txt
              cat /tmp/review_stderr.txt >> /tmp/review_output.txt
            }

          DECISION=$(python3 -c "lines=open('/tmp/review_output.txt').readlines();print(next((l.strip() for l in lines if l.strip() in ('APPROVE','REQUEST_CHANGES')),'REQUEST_CHANGES'))")
          echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"
          echo "Review decision: ${DECISION}"

      - name: Post approval review
        if: steps.ai_review.outputs.decision == 'APPROVE'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          PR="${{ github.event.pull_request.number }}"
          BODY=$(tail -n +2 /tmp/review_output.txt)
          printf '%s\n\n%s\n\n%s\n%s\n' \
            "### autodev-review: APPROVE" \
            "${BODY}" \
            "---" \
            "*Reviewed by autodev-train - Qwen Code + DeepSeek v4.0 Pro*" \
            > /tmp/approve_body.txt
          # Use REST API directly to avoid gh CLI GraphQL Projects-classic deprecation errors
          gh api -X POST "repos/${REPO}/pulls/${PR}/reviews" \
            --field commit_id="${PR_HEAD_SHA}" \
            --field event=APPROVE \
            --field body="$(cat /tmp/approve_body.txt)" > /dev/null
          gh api -X POST "repos/${REPO}/issues/${PR}/labels" \
            -f 'labels[]=review-passed'

      - name: Post request-changes review
        if: steps.ai_review.outputs.decision == 'REQUEST_CHANGES'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          PR="${{ github.event.pull_request.number }}"
          BODY=$(tail -n +2 /tmp/review_output.txt)
          printf '%s\n\n%s\n\n%s\n%s\n\n%s\n' \
            "### autodev-review: REQUEST_CHANGES" \
            "${BODY}" \
            "---" \
            "*Reviewed by autodev-train - Qwen Code + DeepSeek v4.0 Pro*" \
            "Retry: push a new commit to this branch; review will re-run automatically." \
            > /tmp/rc_body.txt
          gh api -X POST "repos/${REPO}/pulls/${PR}/reviews" \
            --field commit_id="${PR_HEAD_SHA}" \
            --field event=REQUEST_CHANGES \
            --field body="$(cat /tmp/rc_body.txt)"
