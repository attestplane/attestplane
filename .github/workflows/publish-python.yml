name: publish-python
run-name: publish-python ${{ inputs.release_ref || github.ref_name }} ${{ inputs.target || 'auto' }} caller-${{ inputs.caller_run_id || github.run_id }}

on:
  workflow_call:
    inputs:
      target:
        description: 'Publication target'
        required: true
        type: string
      release_ref:
        description: 'Git ref or tag to publish from'
        required: false
        type: string
      dry_run:
        description: 'Build only; do not publish'
        required: false
        default: false
        type: boolean
      caller_run_id:
        description: 'Optional release-cd run id used to correlate delegated publishes'
        required: false
        default: ''
        type: string
  workflow_dispatch:
    inputs:
      target:
        description: 'Publication target'
        required: true
        default: 'testpypi'
        type: choice
        options:
          - testpypi
          - pypi
      release_ref:
        description: 'Git ref or tag to publish from (empty = workflow ref)'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Build only; do not publish'
        required: false
        default: false
        type: boolean
      caller_run_id:
        description: 'Optional release-cd run id used to correlate delegated publishes'
        required: false
        default: ''
        type: string
  push:
    tags:
      - 'sdk-python-v*'

permissions:
  contents: read

concurrency:
  group: publish-python-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build wheel + sdist (sdk/python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.release_ref || github.ref }}

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: sdk/python/pyproject.toml

      - name: Compute SOURCE_DATE_EPOCH from HEAD
        id: sde
        run: |
          echo "value=$(git log -1 --pretty=%ct HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build wheel + sdist
        env:
          SOURCE_DATE_EPOCH: ${{ steps.sde.outputs.value }}
        run: |
          uv venv --python 3.12 .venv
          uv pip install --python .venv/bin/python build hatchling
          .venv/bin/python -m build --wheel --sdist -o dist
          ls -la dist/
          .venv/bin/python -c "
          import hashlib, glob, os
          for path in sorted(glob.glob('dist/*')):
              with open(path, 'rb') as f:
                  h = hashlib.sha256(f.read()).hexdigest()
              print(f'{h}  {os.path.basename(path)}')
          "

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: python-dist-${{ github.run_id }}
          path: sdk/python/dist/
          retention-days: 30
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi' && inputs.dry_run != true
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/attestplane
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-dist-${{ github.run_id }}
          path: dist/

      - name: Confirm dist contents
        run: ls -la dist/

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: true
          verbose: true

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/sdk-python-v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi' && inputs.dry_run != true) ||
      (github.event_name == 'workflow_call' && inputs.target == 'pypi' && inputs.dry_run != true)
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/attestplane
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-dist-${{ github.run_id }}
          path: dist/

      - name: Confirm dist contents
        run: ls -la dist/

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
          skip-existing: true
          verbose: true
