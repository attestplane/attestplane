name: reproducible-build

# Gap G5: dual-runner reproducible build.
# Builds the attestplane Python wheel on two independent runner images
# (ubuntu-latest + macos-latest) and then compares SHA-256 byte-for-byte.
# Two independent OSes producing the same wheel bytes is the audit signal
# Big 4 / SLSA L3 actually care about — same-runner two-builds (the prior
# behaviour) only proves the build is determinism-tolerant on one machine.
#
# Pure-Python wheel filenames are platform-independent (py3-none-any) so
# this comparison is meaningful for the attestplane substrate today.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "sdk/python/**"
      - ".github/workflows/reproducible-build.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: reproducible-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

defaults:
  run:
    working-directory: sdk/python

jobs:
  build:
    name: Build attestplane wheel on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: sdk/python/pyproject.toml

      - name: Compute SOURCE_DATE_EPOCH from HEAD
        id: sde
        working-directory: ${{ github.workspace }}
        run: |
          echo "value=$(git log -1 --pretty=%ct HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build wheel
        env:
          SOURCE_DATE_EPOCH: ${{ steps.sde.outputs.value }}
        run: |
          uv venv --python 3.12 .venv
          uv pip install --python .venv/bin/python build hatchling
          .venv/bin/python -m build --wheel -o dist
          ls -la dist

      - name: Hash wheel
        id: hash
        run: |
          set -euo pipefail
          (cd dist && sha256sum ./*.whl | sort) > wheel.sha256
          cat wheel.sha256

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: attestplane-wheel-${{ matrix.os }}-${{ github.sha }}
          path: |
            sdk/python/dist/*.whl
            sdk/python/wheel.sha256
          retention-days: 30
          if-no-files-found: error

  verify:
    name: Two independent runners produced byte-identical wheel
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: attestplane-wheel-ubuntu-latest-${{ github.sha }}
          path: ubuntu-build

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: attestplane-wheel-macos-latest-${{ github.sha }}
          path: macos-build

      - name: Compare wheel SHA-256 across ubuntu vs macos
        run: |
          set -euo pipefail
          h_ubuntu=$(cat ubuntu-build/wheel.sha256)
          h_macos=$(cat macos-build/wheel.sha256)
          echo "--- ubuntu-latest ---"
          echo "$h_ubuntu"
          echo "--- macos-latest ---"
          echo "$h_macos"
          if [ "$h_ubuntu" != "$h_macos" ]; then
            echo ""
            echo "::error::Dual-runner reproducible-build FAILED — wheel bytes differ between ubuntu and macos"
            echo ""
            echo "Diff of wheel.sha256:"
            diff <(echo "$h_ubuntu") <(echo "$h_macos") || true
            echo ""
            echo "Diagnostic: list both wheels"
            ls -la ubuntu-build macos-build
            exit 1
          fi
          echo ""
          echo "Wheel byte-identical across two independent runner images ✓"
          echo "$h_ubuntu"
