name: automerge-autodev-pr

# autodev-train Stage 3: Auto-merge after AI review approval + CI pass.
# Triggers when 'review-passed' label is added to an 'autodev-pr' PR,
# or when a PR review is submitted (approved) on an autodev-pr.
# Uses `gh pr merge --auto` so GitHub waits for all required CI checks
# before executing the actual merge.

on:
  pull_request:
    types: [labeled]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # No proxy here: this job runs on ubuntu-latest (GitHub-hosted),
  # not behind GFW. Proxy is only needed on self-hosted macOS runners.

jobs:
  automerge:
    name: Auto-merge PR #${{ github.event.pull_request.number }}
    # Merge only when both labels are present and review is approved
    if: >-
      contains(join(github.event.pull_request.labels.*.name, ','), 'autodev-pr') &&
      contains(join(github.event.pull_request.labels.*.name, ','), 'review-passed')
    runs-on: ubuntu-latest
    steps:
      - name: Verify review approval exists
        id: review_check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          PR="${{ github.event.pull_request.number }}"
          # Check for at least one APPROVED review (not dismissed)
          APPROVED=$(gh pr view "$PR" -R "${REPO}" --json reviews \
            --jq '[.reviews[] | select(.state == "APPROVED")] | length')
          echo "approved_count=${APPROVED}" >> "$GITHUB_OUTPUT"
          echo "Approved review count: ${APPROVED}"

      - name: Enable auto-merge (squash)
        if: steps.review_check.outputs.approved_count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          PR="${{ github.event.pull_request.number }}"
          PR_TITLE=$(gh pr view "$PR" -R "${REPO}" --json title -q .title)

          # --auto: wait for all required status checks before merging
          printf '%s\n\n%s\n' \
            "Squash-merged by autodev-train after AI review approval and CI passage." \
            "Pipeline: implement-planned-task -> review-autodev-pr -> automerge-autodev-pr" \
            > /tmp/merge_body.txt
          gh pr merge "$PR" -R "${REPO}" \
            --squash \
            --auto \
            --subject "${PR_TITLE} [autodev]" \
            --body "$(cat /tmp/merge_body.txt)"

          echo "✅ Auto-merge enabled for PR #${PR}. GitHub will merge when all CI checks pass."

      - name: Skip — no approved review found
        if: steps.review_check.outputs.approved_count == '0'
        run: |
          echo "⏭ Skipping auto-merge: PR #${{ github.event.pull_request.number }} has no approved reviews yet."
          echo "Auto-merge will be triggered again when the review-passed label is present alongside an APPROVED review."
