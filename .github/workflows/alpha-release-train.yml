name: alpha-release-train

on:
  workflow_dispatch:
    inputs:
      queue_path:
        description: "Finite alpha train queue path"
        required: true
        default: "release/alpha-train/queue.json"
      max_count:
        description: "Maximum candidates to release"
        required: true
        default: "1"
      execute:
        description: "Execute release mutations"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: alpha-release-train-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-train:
    name: Validate finite alpha release train
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Validate queue in dry-run mode
        run: |
          python scripts/release/alpha_release_train.py \
            --queue "${{ inputs.queue_path }}" \
            --max-count "${{ inputs.max_count }}"
      - name: Refuse execute in CI wrapper
        if: ${{ inputs.execute == true }}
        run: |
          echo "::error::alpha-release-train workflow is validation-only; execute locally to preserve registry verification and release review"
          exit 1
