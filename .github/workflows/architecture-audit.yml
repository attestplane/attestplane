name: architecture-audit

# Sidecar workflow for milestone development planning. It listens to
# successful release-cd runs and prepares a read-only audit bundle at every
# medium or architecture-level stable milestone. It never blocks package publication,
# never creates or moves git tags, and only consults Opus when an explicit
# OPUS_PLAN_COMMAND repository variable is configured for this workflow.

on:
  workflow_run:
    workflows: ["release-cd"]
    types: [completed]
  workflow_dispatch:
    inputs:
      milestone_tag:
        description: "Stable milestone tag to inspect, e.g. v1.5.0"
        required: true
        type: string
      anchor_tag:
        description: "Optional prior audit anchor tag"
        required: false
        default: ""
        type: string

permissions:
  actions: read
  contents: read
  issues: write

concurrency:
  group: architecture-audit-${{ github.event.workflow_run.id || inputs.milestone_tag }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ARCHITECTURE_AUDIT_PYTHON: python3.11

jobs:
  prepare:
    name: Prepare architecture audit bundle
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    # Opus planning depends on the local ask_opus.sh bridge, so keep this
    # workflow on the dedicated runner label instead of general hosted CI.
    runs-on: [self-hosted, macOS, ARM64, opus-plan]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Use local Python on Opus runner
        run: |
          set -euo pipefail
          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
          "$ARCHITECTURE_AUDIT_PYTHON" --version

      - name: Ensure audit labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh label create development-plan \
            --description "Milestone planning issue generated from release cadence" \
            --color "1d76db" \
            --force
          gh label create planned-task \
            --description "Executable task generated from an accepted plan" \
            --color "0052cc" \
            --force
          gh label create architecture-audit \
            --description "Stable release planning milestone" \
            --color "5319e7" \
            --force
          gh label create upgrade-daily \
            --description "Daily upgrade planning milestone" \
            --color "c2e0c6" \
            --force
          gh label create upgrade-medium \
            --description "Medium upgrade planning milestone" \
            --color "fbca04" \
            --force
          gh label create upgrade-architecture \
            --description "Architecture-level upgrade planning milestone" \
            --color "b60205" \
            --force
          gh label create audited \
            --description "Architecture audit reviewed and accepted" \
            --color "0e8a16" \
            --force
          gh label create area:conformance \
            --description "Conformance test and fixture coverage" \
            --color "0052cc" \
            --force
          gh label create area:verifier \
            --description "Verifier behavior and validation" \
            --color "0052cc" \
            --force

      - name: Resolve milestone tag
        id: milestone
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          INPUT_TAG: ${{ inputs.milestone_tag }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$INPUT_TAG"
          else
            tag="$(gh run view "$WORKFLOW_RUN_ID" \
              --json displayTitle \
              --jq '.displayTitle | capture("release-cd (?<tag>v[0-9]+\\.[0-9]+\\.[0-9]+)$").tag')"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Architecture audit candidate: $tag"

      - name: Find latest closed audited architecture issue
        id: previous
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          issue_json="$(gh issue list \
            --state closed \
            --label architecture-audit \
            --label audited \
            --limit 1 \
            --json number,url,body \
            --jq '.[0] // {}')"
          issue_url="$(ISSUE_JSON="$issue_json" "$ARCHITECTURE_AUDIT_PYTHON" -c "import json, os; issue = json.loads(os.environ['ISSUE_JSON']); print(issue.get('url', ''))")"
          anchor="$(ISSUE_JSON="$issue_json" "$ARCHITECTURE_AUDIT_PYTHON" -c "import json, os, re; tick = chr(96); issue = json.loads(os.environ['ISSUE_JSON']); match = re.search('- milestone: ' + tick + '([^' + tick + ']+)' + tick, issue.get('body', '')); print(match.group(1) if match else '')")"
          echo "issue_url=$issue_url" >> "$GITHUB_OUTPUT"
          echo "anchor=$anchor" >> "$GITHUB_OUTPUT"

      - name: Prepare bundle
        id: audit
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_ANCHOR: ${{ inputs.anchor_tag }}
          PREVIOUS_ANCHOR: ${{ steps.previous.outputs.anchor }}
          PREVIOUS_ISSUE: ${{ steps.previous.outputs.issue_url }}
          OPUS_PLAN_COMMAND: ${{ vars.OPUS_PLAN_COMMAND }}
        run: |
          set -euo pipefail
          anchor="${INPUT_ANCHOR:-$PREVIOUS_ANCHOR}"
          audit_args=(
            --milestone-tag "${{ steps.milestone.outputs.tag }}"
            --output-dir reports/architecture-audits
            --json
          )
          if [ -n "$anchor" ]; then
            audit_args+=(--anchor-tag "$anchor")
          fi
          if [ -n "$PREVIOUS_ISSUE" ]; then
            audit_args+=(--previous-audit-issue "$PREVIOUS_ISSUE")
          fi
          if [ -n "${OPUS_PLAN_COMMAND:-}" ]; then
            audit_args+=(--opus-plan-command "$OPUS_PLAN_COMMAND")
          fi
          mkdir -p reports/architecture-audits
          gh issue list \
            --state open \
            --limit 100 \
            --json number,title,labels,url,updatedAt \
            > reports/architecture-audits/open-issues.json
          audit_args+=(--open-issues-file reports/architecture-audits/open-issues.json)
          "$ARCHITECTURE_AUDIT_PYTHON" scripts/release/architecture_audit_trigger.py \
            "${audit_args[@]}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: steps.audit.outputs.should_upload_artifact == 'true'
        with:
          name: architecture-gap-audit-${{ steps.milestone.outputs.tag }}
          path: reports/architecture-audits/
          retention-days: 90

      - name: Open architecture audit issue
        id: planning_issue
        if: steps.audit.outputs.should_open_issue == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_TITLE: ${{ steps.audit.outputs.issue_title }}
          ISSUE_BODY: ${{ steps.audit.outputs.issue_body }}
          UPGRADE_LABEL: ${{ steps.audit.outputs.upgrade_label }}
        run: |
          set -euo pipefail
          existing="$(gh issue list \
            --state open \
            --label architecture-audit \
            --search "$ISSUE_TITLE in:title" \
            --json number \
            --jq '.[0].number // ""')"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$ISSUE_BODY"
            issue="$existing"
          else
            created_url="$(gh issue create \
              --title "$ISSUE_TITLE" \
              --label development-plan \
              --label architecture-audit \
              --label "$UPGRADE_LABEL" \
              --body "$ISSUE_BODY")"
            issue="${created_url##*/}"
          fi
          echo "number=$issue" >> "$GITHUB_OUTPUT"

      - name: Post generated plan comment
        if: steps.audit.outputs.should_open_issue == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PLANNING_ISSUE: ${{ steps.planning_issue.outputs.number }}
          AUTO_ISSUE_PLAN: ${{ steps.audit.outputs.auto_issue_plan }}
        run: |
          set -euo pipefail
          if [ -z "$PLANNING_ISSUE" ]; then
            echo "planning issue number was not resolved" >&2
            exit 1
          fi
          if [ -z "$AUTO_ISSUE_PLAN" ]; then
            echo "generated plan was empty" >&2
            exit 1
          fi
          printf '%s\n' "$AUTO_ISSUE_PLAN" > accepted-architecture-plan.md
          gh issue comment "$PLANNING_ISSUE" --body-file accepted-architecture-plan.md

      - name: Create planned-task issues from generated plan
        if: steps.audit.outputs.should_open_issue == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PLANNING_ISSUE: ${{ steps.planning_issue.outputs.number }}
        run: |
          set -euo pipefail
          gh label create priority-P0 \
            --description "Must be resolved before the milestone can be accepted" \
            --color "d73a4a" \
            --force
          gh label create priority:P1 \
            --description "High-priority milestone task" \
            --color "fbca04" \
            --force
          gh label create priority:P2 \
            --description "Normal-priority milestone task" \
            --color "ededed" \
            --force
          gh label create area:release-integrity \
            --description "Release integrity automation and policy" \
            --color "0052cc" \
            --force
          gh label create area:docs \
            --description "Documentation" \
            --color "0052cc" \
            --force
          gh label create area:governance \
            --description "Project governance and policy" \
            --color "0052cc" \
            --force
          gh label create type:docs \
            --description "Documentation only" \
            --color "0075ca" \
            --force
          gh label create type:security \
            --description "Security-sensitive planning or hardening" \
            --color "b60205" \
            --force
          gh label create claim-safety \
            --description "Release and compliance claim-safety boundary" \
            --color "ededed" \
            --force
          "$ARCHITECTURE_AUDIT_PYTHON" scripts/release/plan_to_issues.py \
            --plan-file accepted-architecture-plan.md \
            --source-issue "$PLANNING_ISSUE" \
            --create \
            --json > planned-task-issues.json
          "$ARCHITECTURE_AUDIT_PYTHON" - <<'PY' > planned-task-summary.md
          import json

          issues = json.load(open("planned-task-issues.json", encoding="utf-8"))
          print("Accepted plan uploaded to GitHub and reloaded as `planned-task` issues:")
          print()
          for issue in issues:
              print(f"- {issue['url']} {issue['title']}")
          print()
          print("Implementation must start from these task issues, one issue at a time.")
          PY
          gh issue comment "$PLANNING_ISSUE" --body-file planned-task-summary.md

      - name: Summary
        run: |
          {
            echo "## Development plan"
            echo ""
            echo "- tag: \`${{ steps.milestone.outputs.tag }}\`"
            echo "- action: \`${{ steps.audit.outputs.action }}\`"
            echo "- reason: \`${{ steps.audit.outputs.reason }}\`"
            echo "- consultation_level: \`${{ steps.audit.outputs.consultation_level }}\`"
            echo "- plan_source: \`${{ steps.audit.outputs.plan_source }}\`"
            echo "- plan_fallback_reason: \`${{ steps.audit.outputs.plan_fallback_reason }}\`"
            echo "- plan_id: \`${{ steps.audit.outputs.plan_id }}\`"
            echo "- upgrade_label: \`${{ steps.audit.outputs.upgrade_label }}\`"
            echo "- anchor: \`${{ steps.audit.outputs.anchor_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: File follow-up on audit workflow failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Architecture audit workflow failed for ${{ steps.milestone.outputs.tag || github.run_id }}" \
            --label architecture-audit \
            --body "The sidecar architecture-audit workflow failed after release-cd. This does not block the published release. Inspect run ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}."
