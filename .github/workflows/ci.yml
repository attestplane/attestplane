name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23
        with:
          globs: |
            **/*.md
            !.github/**

  yaml-lint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: frenck/action-yamllint@34b4bbcaeabedcfefad6adea8c5bbc42af0e2d47 # v1.5

  typos:
    name: Spell check (typos)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: crate-ci/typos@aca895bf05aec0cb7dffa6f94495e923224d9f17 # v1.46.2

  codespell:
    name: Spell check (codespell)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: codespell-project/actions-codespell@8f01853be192eb0f849a5c7d721450e7a467c579 # v2.2
        with:
          # in-toto is the attestation-format standard (SLSA/Sigstore ecosystem).
          # afterAll is a vitest API name. CNA/CNAs = CVE Numbering Authority
          # (MITRE CVE Program term, appears in docs/security/mitre-cna-application.md).
          # All are valid project terms.
          ignore_words_list: BaFin,attestplane,nd,recuse,recused,recusal,intoto,Intoto,afterAll,cna,CNA,CNAs
          skip: .git,LICENSE,DCO.txt,*.lock,_typos.toml,.codespellrc,.lycheeignore,sdk/typescript/dist

  link-check:
    name: Link check (lychee)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          args: >-
            --no-progress
            --max-concurrency 4
            --accept 200,204,206,301,302,308
            --exclude '^mailto:'
            './**/*.md'
          fail: true

  dco-check:
    name: DCO sign-off check (PRs only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Verify Signed-off-by on all PR commits
        run: |
          set -e
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          missing=""
          for sha in $(git log --format='%H' "$base..$head"); do
            if ! git log -1 --format='%B' "$sha" | grep -q '^Signed-off-by: '; then
              subject=$(git log -1 --format='%s' "$sha")
              missing="$missing\n  - ${sha} (${subject})"
            fi
          done
          if [ -n "$missing" ]; then
            printf "::error::Commits missing DCO Signed-off-by line:%s\n" "$missing"
            echo ""
            echo "See CONTRIBUTING.md section 1 and DCO.txt. Sign off with: git commit -s --amend"
            exit 1
          fi
          echo "All commits in PR have DCO sign-off."

  policy-invariants:
    name: Project policy invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run policy checks
        run: bash scripts/check-policy.sh

  actionlint:
    name: GitHub Actions lint (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run actionlint via docker
        run: |
          docker run --rm \
            -v "${PWD}:/repo:ro" \
            --workdir /repo \
            rhysd/actionlint:1.7.7 \
            -color

  shellcheck:
    name: Shell script lint (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run shellcheck on scripts/
        run: |
          set -e
          shopt -s nullglob
          files=(scripts/*.sh)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no shell scripts to check"
            exit 0
          fi
          shellcheck --severity=warning --shell=bash "${files[@]}"

  reuse-lint:
    name: REUSE compliance (SPDX headers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6

  license-detection:
    name: License detection (GitHub API)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Verify GitHub detects Apache-2.0
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          detected=$(gh api "repos/${{ github.repository }}" -q '.license.spdx_id')
          if [ "$detected" != "Apache-2.0" ]; then
            echo "::error::License detection failed: got '$detected', expected 'Apache-2.0'"
            exit 1
          fi
          echo "License correctly detected as Apache-2.0"
