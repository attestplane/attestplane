name: sdk-python

on:
  push:
    branches: [main]
    paths:
      - "sdk/python/**"
      - ".github/workflows/sdk-python.yml"
  pull_request:
    branches: [main]
    paths:
      - "sdk/python/**"
      - ".github/workflows/sdk-python.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sdk-python-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"

defaults:
  run:
    working-directory: sdk/python

jobs:
  lint-and-typecheck:
    name: Ruff + mypy --strict (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: sdk/python/pyproject.toml
      - name: Install and run lint/type checks
        run: |
          uv venv --python ${{ matrix.python }} .venv
          uv pip install -e '.[dev]'
          .venv/bin/ruff check src tests
          .venv/bin/mypy

  test:
    name: pytest (py${{ matrix.python }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: sdk/python/pyproject.toml
      - name: Install and run pytest
        run: |
          uv venv --python ${{ matrix.python }} .venv
          uv pip install -e '.[dev]'
          .venv/bin/pytest --cov --cov-report=term --cov-fail-under=88

  conformance-vectors-frozen:
    name: Conformance vectors are byte-frozen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: sdk/python/pyproject.toml
      - name: Install and re-generate vectors
        run: |
          uv venv --python 3.12 .venv
          uv pip install -e '.[dev]'
          .venv/bin/python -m tests.conformance.generate_vectors > /tmp/regenerated.json
      - name: Confirm regenerated vectors match the committed file
        run: diff -u tests/conformance/vectors.json /tmp/regenerated.json
