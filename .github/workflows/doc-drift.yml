name: doc-drift

# Doc-drift baseline. Two read-only gates:
#   1. lychee link check over all .md files in the repo (using .lycheeignore).
#   2. scripts/check_api_manifest_vs_impl.py — diffs the public Python API
#      against symbols referenced in docs/spec/ and docs/architecture/.
#
# This workflow never writes under docs/spec/ (R6 — aia-12-aligned-profile.md
# is frozen) and never moves a tag or publishes a release.

on:
  schedule:
    # Tuesday 05:23 UTC. Distinct from codeql / scorecard (Monday 06:00 UTC).
    - cron: "23 5 * * 2"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "sdk/python/src/attestplane/**"
      - ".github/workflows/doc-drift.yml"
      - "scripts/check_api_manifest_vs_impl.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: doc-drift-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  link-check:
    name: Link check (lychee, all *.md)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          # Match the existing ci.yml lychee invocation: same flags, same
          # accept set. .lycheeignore at repo root applies automatically.
          args: >-
            --no-progress
            --max-concurrency 4
            --accept 200,204,206,301,302,308
            --exclude '^mailto:'
            './**/*.md'
          fail: true

  api-manifest-vs-impl:
    name: API manifest vs implementation (drift gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Run drift check (pure stdlib, read-only)
        run: python3 scripts/check_api_manifest_vs_impl.py
