name: provenance

# Manual alpha release provenance hygiene gate.
#
# This workflow intentionally defaults to dry-run inventory checks. It does
# not publish PyPI/npm packages, does not create or move tags, does not upload
# release assets, and does not claim SLSA L3 or production-grade supply-chain
# security. Future execute-mode provenance publication must be explicitly
# requested through workflow_dispatch inputs and reviewed against the release
# artifact manifest.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to inspect"
        required: true
        default: "v0.0.2-alpha"
        type: string
      execute:
        description: "Reserved for future provenance asset upload; dry-run when false"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: provenance-${{ github.workflow }}-${{ inputs.tag }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  dry-run:
    name: Release artifact manifest and provenance dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Confirm requested tag exists
        run: |
          set -euo pipefail
          git fetch --tags --force
          git rev-list -n 1 "${{ inputs.tag }}"

      - name: Run release provenance dry-run gate
        run: bash scripts/check-release-provenance.sh

      - name: Refuse execute mode until asset upload is separately authorized
        if: inputs.execute == true
        run: |
          echo "::error::execute=true is reserved; this alpha workflow is dry-run only"
          exit 1
