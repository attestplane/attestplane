# Aegis AI 代码审核 CI 流水线（深度门 — 全 9 层，self-hosted runner，零额外费用）
name: Aegis AI Code Review

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]   # 直推 main 时事后告警（正常应被 branch protection 拦住）

jobs:
  aegis:
    # pull_request 触发时正常跑；push 触发只在直推 main 时跑（避免与 PR 触发重复烧 LLM key）
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: [self-hosted, linux, x64, aegis]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # push 多 commit 时需要完整历史

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install aegis
        run: cargo install --git https://github.com/merchloubna70-dot/aegis

      - name: Install security tools
        run: |
          pip install semgrep 2>/dev/null || true
          which gitleaks || curl -sSfL https://raw.githubusercontent.com/zricethezav/gitleaks/master/scripts/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Aegis
        run: aegis check . --generator copilot --format both --report-to http://127.0.0.1:3001/report
        env:
          AEGIS_LLM_KEY: ${{ secrets.AEGIS_LLM_KEY }}
          AEGIS_REPORT_TOKEN: ${{ secrets.AEGIS_REPORT_TOKEN }}
          AEGIS_REPO: ${{ github.repository }}
          AEGIS_SHA: ${{ github.event.pull_request.head.sha }}
          AEGIS_PR_NUM: ${{ github.event.pull_request.number }}

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aegis-report
          path: |
            aegis-report.md
            aegis-report.json
