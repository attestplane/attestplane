name: sign-release

# Manual alpha release asset signing gate.
#
# Default mode is dry-run. The workflow does not run on release publication,
# does not create releases, does not publish PyPI/npm packages, and does not
# upload signature assets unless execute=true is explicitly supplied.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to inspect (e.g. v0.0.2-alpha)"
        required: true
        default: "v0.0.2-alpha"
        type: string
      execute:
        description: "Actually sign and upload assets; false is dry-run only"
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      execute:
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: sign-release-${{ github.workflow }}-${{ inputs.tag }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  dry-run:
    name: Cosign keyless signing dry-run
    if: inputs.execute != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Confirm requested tag exists
        run: |
          set -euo pipefail
          git fetch --tags --force
          git rev-list -n 1 "${{ inputs.tag }}"

      - name: Download release asset names
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/release
          gh release download "${{ inputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "*" \
            --dir /tmp/release \
            --skip-existing || true
          find /tmp/release -maxdepth 1 -type f -print | sort || true

      - name: Run signing helper in dry-run mode
        run: |
          set -euo pipefail
          mapfile -t files < <(find /tmp/release -maxdepth 1 -type f ! -name "*.cosign.bundle" ! -name "*.sig" ! -name "*.pem" -print | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No downloaded release assets to sign in dry-run."
            exit 0
          fi
          bash scripts/release/sign_assets_cosign_keyless.sh "${files[@]}"

  execute:
    name: Cosign keyless sign and upload release assets
    if: inputs.execute == true
    runs-on: ubuntu-latest
    environment:
      name: release-signing
      url: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ inputs.tag }}
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "v3.0.6"

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/release
          gh release download "${{ inputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "*" \
            --dir /tmp/release \
            --skip-existing
          find /tmp/release -maxdepth 1 -type f -print | sort

      - name: Sign assets with cosign keyless
        run: |
          set -euo pipefail
          mapfile -t files < <(find /tmp/release -maxdepth 1 -type f ! -name "*.cosign.bundle" ! -name "*.sig" ! -name "*.pem" -print | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::no primary release assets found to sign"
            exit 1
          fi
          bash scripts/release/sign_assets_cosign_keyless.sh --execute --require-cosign "${files[@]}"

      - name: Upload signature artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mapfile -t signatures < <(find /tmp/release -maxdepth 1 \( -name "*.cosign.bundle" -o -name "*.sig" -o -name "*.pem" \) -print | sort)
          if [ "${#signatures[@]}" -eq 0 ]; then
            echo "::error::no signature artifacts produced"
            exit 1
          fi
          bash scripts/release/upload_github_release_assets.sh --tag "${{ inputs.tag }}" --execute --clobber "${signatures[@]}"
