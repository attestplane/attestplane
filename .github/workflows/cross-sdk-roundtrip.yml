name: cross-sdk-roundtrip

# Tier-2 pre-merge thorough gate. Proves the Python and TypeScript SDKs
# agree byte-for-byte on canonical_text + canonical (JSON) for the corpus
# in tests/cross_sdk/corpus.json. This is the closing edge of the
# Py → TS → Py loop required by docs/ci_testing_framework_20260518.md §G1.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cross-sdk-roundtrip-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  roundtrip:
    name: Py → TS → Py canonical byte equivalence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: sdk/python/pyproject.toml

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install Python SDK
        working-directory: sdk/python
        run: |
          uv venv --python 3.12 .venv
          uv pip install -e '.[dev]'

      - name: Build TypeScript SDK
        working-directory: sdk/typescript
        run: |
          npm ci
          npm run build

      - name: Step 1 — Python emit
        run: sdk/python/.venv/bin/python tests/cross_sdk/py_emit.py

      - name: Step 2 — TypeScript round-trip
        run: node tests/cross_sdk/ts_roundtrip.mjs

      - name: Step 3 — Python verify
        run: sdk/python/.venv/bin/python tests/cross_sdk/py_verify.py

      - name: Upload round-trip artefacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cross-sdk-roundtrip-${{ github.sha }}
          path: |
            tests/cross_sdk/py_emit.json
            tests/cross_sdk/ts_reemit.json
          retention-days: 7
          if-no-files-found: ignore
