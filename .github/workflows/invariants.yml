name: invariants

# Tier-0 invariant gates. Must complete in &lt; 30s on a clean runner — these
# are the substrate-level red lines: AP-EVD/1.0 schema bytes + Accepted ADR
# Decisions. Any drift here is a deliberate governance event, not a normal
# code change.
#
# See docs/ci_testing_framework_20260518.md and docs/adr/0014-adapter-conformance-fixture-pinning.md.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: invariants-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  schema-hashes:
    name: AP-EVD/1.0 schemas/v1 hash lock
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Verify canonical-JSON SHA-256 of every schemas/v1/*.schema.json
        run: bash scripts/check-schema-hashes.sh

  adr-frozen-blocks:
    name: Accepted ADR Decision sections frozen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Verify ## Decision SHA-256 of every Accepted ADR
        run: bash scripts/check-adr-frozen-blocks.sh

  fixture-hashes:
    name: Conformance fixtures byte-frozen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Verify canonical-JSON SHA-256 of every fixture
        run: bash scripts/check-fixture-hashes.sh

  public-api:
    name: Public API manifest drift gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Verify Python/TypeScript public API manifests
        run: bash scripts/check-public-api.sh

  fault-injection:
    name: Deterministic fault-injection gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json
      - name: Install Python SDK test dependencies
        run: |
          python -m venv sdk/python/.venv
          sdk/python/.venv/bin/python -m pip install -e "sdk/python[test,anchor]"
      - name: Install TypeScript SDK dependencies
        run: npm ci --prefix sdk/typescript
      - name: Verify deterministic fail-closed fault matrix
        run: bash scripts/check-fault-injection.sh
