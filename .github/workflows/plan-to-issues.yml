name: plan-to-issues

on:
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  convert:
    name: Convert accepted plan into planned-task issues
    if: >-
      github.event.issue.pull_request == null &&
      contains(join(github.event.issue.labels.*.name, ','), 'development-plan') &&
      contains(join(github.event.issue.labels.*.name, ','), 'architecture-audit') &&
      (
        contains(github.event.comment.body, 'ATT_PLAN_SCHEMA_V1') ||
        (
          contains(github.event.comment.body, 'ISSUE 1') &&
          contains(github.event.comment.body, 'Acceptance criteria')
        )
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Ensure task labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh label create planned-task \
            --description "Executable task generated from an accepted plan" \
            --color "0052cc" \
            --force
          gh label create priority-P0 \
            --description "Must be resolved before the milestone can be accepted" \
            --color "d73a4a" \
            --force
          gh label create priority:P1 \
            --description "High-priority milestone task" \
            --color "fbca04" \
            --force
          gh label create priority:P2 \
            --description "Normal-priority milestone task" \
            --color "ededed" \
            --force
          gh label create architecture-audit \
            --description "Architecture gap audit milestone" \
            --color "5319e7" \
            --force
          gh label create area:release-integrity \
            --description "Release integrity automation and policy" \
            --color "0052cc" \
            --force
          gh label create area:docs \
            --description "Documentation" \
            --color "0052cc" \
            --force
          gh label create area:governance \
            --description "Project governance and policy" \
            --color "0052cc" \
            --force
          gh label create area:conformance \
            --description "Conformance test and fixture coverage" \
            --color "0052cc" \
            --force
          gh label create area:verifier \
            --description "Verifier behavior and validation" \
            --color "0052cc" \
            --force
          gh label create type:docs \
            --description "Documentation only" \
            --color "0075ca" \
            --force
          gh label create type:security \
            --description "Security-sensitive planning or hardening" \
            --color "b60205" \
            --force
          gh label create claim-safety \
            --description "Release and compliance claim-safety boundary" \
            --color "ededed" \
            --force

      - name: Write accepted plan
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          Path("accepted-plan.md").write_text(os.environ["COMMENT_BODY"], encoding="utf-8")
          PY

      - name: Create planned-task issues
        id: convert
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 scripts/release/plan_to_issues.py \
            --plan-file accepted-plan.md \
            --source-issue "${{ github.event.issue.number }}" \
            --create \
            --json > planned-task-issues.json
          {
            echo "created_json<<EOF"
            cat planned-task-issues.json
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Link generated issues back to planning issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PY' > planned-task-summary.md
          import json

          issues = json.load(open("planned-task-issues.json", encoding="utf-8"))
          print("Accepted plan uploaded to GitHub and reloaded as `planned-task` issues:")
          print()
          for issue in issues:
              print(f"- {issue['url']} {issue['title']}")
          print()
          print("Implementation must start from these task issues, one issue at a time.")
          PY
          gh issue comment "${{ github.event.issue.number }}" --body-file planned-task-summary.md
