name: ca-postpublish-verify

# Controlled Availability post-publish verification (CA admission criteria #3
# clean-install smoke and #4 verifier conformance + cross-SDK roundtrip),
# evaluated against the *published* packages installed from PyPI and npm.
#
# SECURITY: this workflow is read-only. It never publishes, never moves a npm
# dist-tag, and references no registry token / OIDC identity. Package
# publication remains exclusively the job of `release-cd` / `manage-npm`.
# Dispatch-only so it is unreachable from PR or fork workflows.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Published version to verify (PyPI X.Y.Z == npm X.Y.Z)."
        required: true
        default: "1.10.1"

permissions:
  contents: read

concurrency:
  group: ca-postpublish-verify-${{ github.event.inputs.version }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  py-registry-smoke:
    name: PyPI clean-install smoke (attestplane==${{ github.event.inputs.version }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install published wheel into a clean venv and smoke it
        env:
          VER: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          VENV="$RUNNER_TEMP/venv"
          uv venv "$VENV" --python 3.12
          uv pip install --python "$VENV/bin/python" "attestplane==${VER}"
          # Run from a neutral dir so the source tree is never on sys.path.
          cp scripts/release/ca_registry_smoke.py "$RUNNER_TEMP/smoke.py"
          "$VENV/bin/python" "$RUNNER_TEMP/smoke.py" smoke "${VER}"

  ts-registry-smoke:
    name: npm clean-install smoke (@attestplane/attestplane@${{ github.event.inputs.version }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Install published package into a throwaway project and smoke it
        env:
          VER: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          PROJ="$RUNNER_TEMP/ca-ts"
          mkdir -p "$PROJ"
          cd "$PROJ"
          npm init -y >/dev/null
          npm install "@attestplane/attestplane@${VER}"
          # Copy the smoke into the project so the bare import resolves to the
          # installed package.
          cp "$GITHUB_WORKSPACE/scripts/release/ca_registry_smoke.mjs" ./ca_registry_smoke.mjs
          node ./ca_registry_smoke.mjs smoke "${VER}"

  cross-sdk-roundtrip:
    name: Cross-SDK roundtrip on published packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: A bundle produced by each SDK verifies in the other (registry packages)
        env:
          VER: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          VENV="$RUNNER_TEMP/venv"
          PROJ="$RUNNER_TEMP/ca-ts"
          XCHG="$RUNNER_TEMP/xchg"
          mkdir -p "$PROJ" "$XCHG"

          uv venv "$VENV" --python 3.12
          uv pip install --python "$VENV/bin/python" "attestplane==${VER}"
          cp scripts/release/ca_registry_smoke.py "$RUNNER_TEMP/smoke.py"

          cd "$PROJ"
          npm init -y >/dev/null
          npm install "@attestplane/attestplane@${VER}"
          cp "$GITHUB_WORKSPACE/scripts/release/ca_registry_smoke.mjs" ./ca_registry_smoke.mjs

          # Assert both ends resolve to the SAME published version before the
          # roundtrip, so a single-sided version mismatch cannot pass silently.
          "$VENV/bin/python" "$RUNNER_TEMP/smoke.py" smoke "${VER}"
          node "$PROJ/ca_registry_smoke.mjs" smoke "${VER}"

          # Python-produced bundle -> verified by the npm package.
          "$VENV/bin/python" "$RUNNER_TEMP/smoke.py" emit "$XCHG/py_bundle.json"
          node "$PROJ/ca_registry_smoke.mjs" verify "$XCHG/py_bundle.json"

          # npm-produced bundle -> verified by the PyPI package.
          node "$PROJ/ca_registry_smoke.mjs" emit "$XCHG/ts_bundle.json"
          "$VENV/bin/python" "$RUNNER_TEMP/smoke.py" verify "$XCHG/ts_bundle.json"
