name: implement-planned-task

# autodev-train Stage 1: Implement a planned-task issue using Codex CLI.
# Triggers when 'planned-task' label is added to any issue.
# Creates a branch, runs Codex, commits with DCO sign-off, opens PR.

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: autodev-implement-${{ github.event.issue.number }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  AUTODEV_BOT_NAME: "autodev-bot"
  AUTODEV_BOT_EMAIL: "258170091+merchloubna70-dot@users.noreply.github.com"

jobs:
  implement:
    name: Implement planned-task #${{ github.event.issue.number }}
    if: github.event.label.name == 'planned-task'
    runs-on: [self-hosted, macOS, ARM64, opus-plan]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure autodev labels exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh label create "autodev-pr" \
            --description "PR generated by autodev-train pipeline" \
            --color "5319e7" --force
          gh label create "review-passed" \
            --description "AI review approved by autodev-review" \
            --color "0e8a16" --force

      - name: Read issue details
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_TITLE_RAW: ${{ github.event.issue.title }}
        run: |
          set -euo pipefail
          N="${{ github.event.issue.number }}"
          TITLE="${ISSUE_TITLE_RAW}"
          BRANCH="autodev/issue-${N}"
          BODY=$(gh issue view "$N" --json body -q .body)
          {
            echo "number=${N}"
            echo "branch=${BRANCH}"
            printf 'title<<__EOF_TITLE__\n'
            printf '%s\n' "$TITLE"
            printf '__EOF_TITLE__\n'
            printf 'body<<__EOF_BODY__\n'
            printf '%s\n' "$BODY"
            printf '__EOF_BODY__\n'
          } >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        run: |
          git config user.name  "$AUTODEV_BOT_NAME"
          git config user.email "$AUTODEV_BOT_EMAIL"

      - name: Create implementation branch
        run: |
          set -euo pipefail
          BRANCH="${{ steps.issue.outputs.branch }}"
          # Reset if branch already exists locally
          git checkout -B "$BRANCH"

      - name: Run Codex CLI to implement task
        env:
          OPENAI_BASE_URL: https://api.deepseek.com/v1
          OPENAI_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          ISSUE_BODY: ${{ steps.issue.outputs.body }}
        run: |
          set -euo pipefail
          {
            printf '%s\n\n' "按照 AGENTS.md 和项目规范实现以下任务。"
            printf '任务标题：%s\n\n' "${ISSUE_TITLE}"
            printf '任务描述：\n%s\n\n' "${ISSUE_BODY}"
            printf '%s\n' "实施要求（严格遵守）："
            printf '%s\n' "1. 严格按照 AGENTS.md 中的规范和约束执行"
            printf '%s\n' "2. 新建文件必须在文件头部添加 REUSE 合规头："
            printf '%s\n' "   - SPDX-License-Identifier: Apache-2.0"
            printf '%s\n' "   - SPDX-FileCopyrightText: 当前年份 Attestplane Contributors"
            printf '%s\n' "3. 不得修改 .github/workflows/ 目录下的任何文件"
            printf '%s\n' "4. 不得修改 scripts/release/ 目录下的任何文件"
            printf '%s\n' "5. 不得执行 git push、git tag、git merge、npm publish、twine upload"
            printf '%s\n' "6. 不得修改 CHANGELOG.md（由发布流水线管理）"
            printf '%s\n' "7. 只修改实现任务所需的最小文件集"
          } > /tmp/autodev_prompt.txt
          codex exec --sandbox workspace-write --model deepseek-v4-pro "$(cat /tmp/autodev_prompt.txt)"

      - name: Check for real changes
        id: changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit with DCO sign-off
        if: steps.changes.outputs.has_changes == 'true'
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
        run: |
          set -euo pipefail
          printf '%s\n\n%s\n\n%s\n%s\n' \
            "feat: implement planned-task #${ISSUE_NUMBER}" \
            "Automated implementation of planned-task issue." \
            "Issue: #${ISSUE_NUMBER}" \
            "Title: ${ISSUE_TITLE}" \
            > /tmp/commit_msg.txt
          git commit --signoff --file /tmp/commit_msg.txt

      - name: Push branch
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git push origin "${{ steps.issue.outputs.branch }}" --force-with-lease

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          ISSUE_BRANCH: ${{ steps.issue.outputs.branch }}
        run: |
          set -euo pipefail
          printf '%s\n\n%s\n\n%s\n\n%s\n\n%s\n\n%s\n%s\n%s\n%s\n%s\n\n%s\n' \
            "## Summary" \
            "Automated implementation generated by **autodev-train** pipeline." \
            "**Task:** ${ISSUE_TITLE}" \
            "Closes #${ISSUE_NUMBER}" \
            "---" \
            "### Pipeline state" \
            "- [x] Stage 1 -- Implementation (this PR)" \
            "- [ ] Stage 2 -- AI review (triggers automatically)" \
            "- [ ] Stage 3 -- CI gates" \
            "- [ ] Stage 4 -- Auto-merge" \
            "*Do not merge manually. autodev-train will merge after review + CI pass.*" \
            > /tmp/pr_body.txt
          PR_URL=$(gh pr create \
            --title "autodev: implement planned-task #${ISSUE_NUMBER}" \
            --body-file /tmp/pr_body.txt \
            --label "autodev-pr" \
            --head "${ISSUE_BRANCH}" \
            --base main)
          echo "PR created: $PR_URL"
          printf '%s\n\n%s\n' \
            "autodev-train: Implementation PR opened -> ${PR_URL}" \
            "Pipeline will auto-merge after AI review approval and all CI checks pass." \
            > /tmp/issue_comment.txt
          gh issue comment "${ISSUE_NUMBER}" --body-file /tmp/issue_comment.txt

      - name: Post failure comment (no changes produced)
        if: steps.changes.outputs.has_changes == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          printf '%s\n\n%s\n%s\n%s\n%s\n\n%s\n' \
            "autodev-train: Codex CLI produced no file changes for this task." \
            "Possible causes:" \
            "- The task description lacks sufficient implementation detail" \
            "- The task requires information not available in AGENTS.md or the codebase" \
            "- The task is already implemented" \
            "Please refine the issue description and re-add the planned-task label to retry." \
            > /tmp/no_changes_comment.txt
          gh issue comment "${ISSUE_NUMBER}" --body-file /tmp/no_changes_comment.txt
          gh issue edit "${ISSUE_NUMBER}" --remove-label "planned-task"
