name: implement-planned-task

# autodev-train Stage 1: Implement a planned-task issue using Codex CLI.
# Triggers when 'planned-task' label is added to any issue.
# Creates a branch, runs Codex, commits with DCO sign-off, opens PR.

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: autodev-implement-${{ github.event.issue.number }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  AUTODEV_BOT_NAME: "autodev-bot"
  AUTODEV_BOT_EMAIL: "258170091+merchloubna70-dot@users.noreply.github.com"

jobs:
  implement:
    name: Implement planned-task #${{ github.event.issue.number }}
    if: github.event.label.name == 'planned-task'
    runs-on: [self-hosted, macOS, ARM64, opus-plan]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure autodev labels exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh label create "autodev-pr" \
            --description "PR generated by autodev-train pipeline" \
            --color "5319e7" --force
          gh label create "review-passed" \
            --description "AI review approved by autodev-review" \
            --color "0e8a16" --force

      - name: Read issue details
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          N="${{ github.event.issue.number }}"
          TITLE="${{ github.event.issue.title }}"
          BRANCH="autodev/issue-${N}"
          BODY=$(gh issue view "$N" --json body -q .body)
          echo "number=${N}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          # Multi-line output
          {
            printf 'title<<__EOF_TITLE__\n'
            printf '%s\n' "$TITLE"
            printf '__EOF_TITLE__\n'
          } >> "$GITHUB_OUTPUT"
          {
            printf 'body<<__EOF_BODY__\n'
            printf '%s\n' "$BODY"
            printf '__EOF_BODY__\n'
          } >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        run: |
          git config user.name  "$AUTODEV_BOT_NAME"
          git config user.email "$AUTODEV_BOT_EMAIL"

      - name: Create implementation branch
        run: |
          set -euo pipefail
          BRANCH="${{ steps.issue.outputs.branch }}"
          # Reset if branch already exists locally
          git checkout -B "$BRANCH"

      - name: Run Codex CLI to implement task
        env:
          OPENAI_BASE_URL: https://api.deepseek.com/v1
          OPENAI_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          set -euo pipefail
          PROMPT="按照 AGENTS.md 和项目规范实现以下任务。

任务标题：${{ steps.issue.outputs.title }}

任务描述：
${{ steps.issue.outputs.body }}

实施要求（严格遵守）：
1. 严格按照 AGENTS.md 中的规范和约束执行
2. 新建文件必须在文件头部添加 REUSE 合规头：
   - SPDX-License-Identifier: Apache-2.0
   - SPDX-FileCopyrightText: 当前年份 Attestplane Contributors
3. 不得修改 .github/workflows/ 目录下的任何文件
4. 不得修改 scripts/release/ 目录下的任何文件
5. 不得执行 git push、git tag、git merge、npm publish、twine upload
6. 不得修改 CHANGELOG.md（由发布流水线管理）
7. 只修改实现任务所需的最小文件集"

          codex --approval-mode full-auto --model deepseek-v4-pro "$PROMPT"

      - name: Check for real changes
        id: changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit with DCO sign-off
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          git commit \
            --signoff \
            -m "feat: implement planned-task #${{ steps.issue.outputs.number }}

Automated implementation of planned-task issue.

Issue: #${{ steps.issue.outputs.number }}
Title: ${{ steps.issue.outputs.title }}

Signed-off-by: ${{ env.AUTODEV_BOT_NAME }} <${{ env.AUTODEV_BOT_EMAIL }}>"

      - name: Push branch
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git push origin "${{ steps.issue.outputs.branch }}" --force-with-lease

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR_URL=$(gh pr create \
            --title "autodev: implement planned-task #${{ steps.issue.outputs.number }}" \
            --body "## Summary

Automated implementation generated by **autodev-train** pipeline.

**Task:** ${{ steps.issue.outputs.title }}

Closes #${{ steps.issue.outputs.number }}

---

### Pipeline state
- [x] Stage 1 — Implementation (this PR)
- [ ] Stage 2 — AI review (triggers automatically)
- [ ] Stage 3 — CI gates
- [ ] Stage 4 — Auto-merge

*Do not merge manually. autodev-train will merge after review + CI pass.*" \
            --label "autodev-pr" \
            --head "${{ steps.issue.outputs.branch }}" \
            --base main)
          echo "PR created: $PR_URL"
          gh issue comment "${{ steps.issue.outputs.number }}" \
            --body "🤖 autodev-train: Implementation PR opened → $PR_URL

Pipeline will auto-merge after AI review approval and all CI checks pass."

      - name: Post failure comment (no changes produced)
        if: steps.changes.outputs.has_changes == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ steps.issue.outputs.number }}" \
            --body "⚠️ autodev-train: Codex CLI produced no file changes for this task.

Possible causes:
- The task description lacks sufficient implementation detail
- The task requires information not available in AGENTS.md or the codebase
- The task is already implemented

Please refine the issue description and re-add the \`planned-task\` label to retry."
          gh issue edit "${{ steps.issue.outputs.number }}" \
            --remove-label "planned-task"
