name: implement-planned-task

# autodev-train: Thin trigger.
# Fires when any issue is opened/reopened, starts an AutodevPipeline
# Temporal workflow on the local Mac runner. The Temporal worker daemon
# handles all stages: implement → review → merge, with SQLite checkpointing
# and built-in retry/断点恢复 at each stage.

on:
  issues:
    types: [opened, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to implement"
        required: true
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: autodev-trigger-${{ github.event.issue.number }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  https_proxy: "http://127.0.0.1:7897"
  http_proxy: "http://127.0.0.1:7897"

jobs:
  trigger:
    name: Trigger Temporal pipeline for issue #${{ github.event.issue.number }}
    runs-on: [self-hosted, macOS, ARM64, opus-plan]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Ensure autodev labels exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "autodev-pr"     --color "5319e7" --force
          gh label create "review-passed"  --color "0e8a16" --force

      - name: Start AutodevPipeline workflow
        env:
          GH_TOKEN: ${{ github.token }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          CODEX_HOME: /Users/macworkers/codex-home
          TEMPORAL_ADDRESS: "localhost:7233"
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number || github.event.issue.number }}
        run: |
          set -euo pipefail
          ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --json title -q .title)
          ISSUE_BODY=$(gh issue view "$ISSUE_NUMBER"  --json body  -q .body)

          bash scripts/autodev/temporal/trigger.sh \
            "$ISSUE_NUMBER" "$ISSUE_TITLE" "$ISSUE_BODY"

      - name: Post pipeline-started comment
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number || github.event.issue.number }}
        run: |
          set -euo pipefail
          N="${ISSUE_NUMBER}"
          printf '%s\n\n%s\n%s\n' \
            "**autodev-train**: Temporal pipeline started for this issue." \
            "Stages: implement → review → merge (with automatic retry and checkpoint recovery)." \
            "Track progress: \`temporal workflow show --workflow-id autodev-issue-${N} --address localhost:7233\`" \
            | gh issue comment "$N" --body-file -
