name: verifier-conformance

on:
  push:
    branches: [main]
    paths:
      - "sdk/python/**"
      - "sdk/typescript/**"
      - ".github/workflows/verifier-conformance.yml"
  pull_request:
    branches: [main]
    paths:
      - "sdk/python/**"
      - "sdk/typescript/**"
      - ".github/workflows/verifier-conformance.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verifier-conformance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  python-and-typescript:
    name: Python and TypeScript verifier conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: sdk/python/pyproject.toml
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Python verifier conformance
        working-directory: sdk/python
        run: |
          uv venv --python 3.12 .venv
          uv pip install -e '.[dev]'
          .venv/bin/pytest tests/conformance/test_verifier_conformance.py -q

      - name: TypeScript verifier conformance
        working-directory: sdk/typescript
        run: |
          npm ci
          npm test -- --run test/verifier_conformance.test.ts
