name: api-ref

on:
  push:
    branches: [main]
    paths:
      - "sdk/**"
      - ".github/workflows/api-ref.yml"
  pull_request:
    branches: [main]
    paths:
      - "sdk/**"
      - ".github/workflows/api-ref.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: api-ref-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  python-api-ref:
    name: Generate Python SDK API reference (pdoc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: sdk/python/pyproject.toml

      - name: Install SDK + pdoc
        run: |
          uv venv --python 3.12 .venv
          uv pip install -e 'sdk/python[dev]' pdoc

      - name: Render Python API reference
        run: |
          .venv/bin/pdoc \
            -o api-ref-python \
            sdk/python/src/attestplane \
            --no-show-source \
            --logo "https://www.bestpractices.dev/projects/12924/badge"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: api-ref-python-${{ github.sha }}
          path: api-ref-python
          retention-days: 60
          if-no-files-found: error

  typescript-api-ref:
    name: Generate TypeScript SDK API reference (typedoc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install SDK dependencies
        run: npm install

      - name: Install typedoc (ephemeral)
        run: npm install --no-save typedoc

      - name: Render TypeScript API reference
        run: npx typedoc --out api-ref-typescript src/index.ts --tsconfig tsconfig.json

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: api-ref-typescript-${{ github.sha }}
          path: sdk/typescript/api-ref-typescript
          retention-days: 60
          if-no-files-found: error
