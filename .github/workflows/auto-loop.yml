name: auto-loop

# Closes the autonomous coding loop:
#   autodev merge → semver bump → architecture-audit → Opus plan
#   → planned-task issues → autodev-train → merge → (repeat)
#
# Version bump logic (Conventional Commits, Opus recommendation):
#   fix:/docs:/chore:  → patch  (0.0.x)
#   feat:/refactor:    → minor  (0.x.0)
#   feat!:/BREAKING    → major  → HUMAN GATE (opens RFC Discussion, no auto-tag)
#
# Batch gate: only fires when ALL open autodev-pr PRs have merged.
# Tag gate:   only creates a new tag every MIN_PRS_PER_TAG merged PRs
#             or after MAX_DAYS_BETWEEN_TAGS days, whichever comes first.

on:
  push:
    branches: [main]
  workflow_dispatch: {}    # allow manual trigger when all PRs closed without merge

permissions:
  contents: write   # push git tag
  actions: write    # gh workflow run (workflow_dispatch)
  issues: write     # open major RFC issue
  discussions: write  # open major RFC Discussion (best-effort)
  pull-requests: read

concurrency:
  group: auto-loop
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  MIN_PRS_PER_TAG: "3"        # batch at least N autodev PRs before tagging
  MAX_DAYS_BETWEEN_TAGS: "7"  # …or tag anyway after 7 days

jobs:
  loop:
    name: Semver bump + trigger architecture audit
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[autodev]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      # ── Guard: skip until current batch is fully merged ──────────────────
      - name: Guard — skip if autodev batch still in flight
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          open_prs=$(gh pr list \
            --repo "${{ github.repository }}" \
            --label autodev-pr \
            --state open \
            --json number \
            --jq 'length')
          {
            echo "open_autodev_prs=${open_prs}"
          } >> "$GITHUB_OUTPUT"
          if [ "$open_prs" -gt 0 ]; then
            echo "⏭ ${open_prs} autodev PR(s) still open — will retrigger on last merge."
          else
            echo "✅ All autodev PRs merged — evaluating version bump."
          fi

      # ── Batch gate: count PRs merged since last tag ───────────────────────
      - name: Count autodev PRs merged since last tag
        id: batch
        if: steps.guard.outputs.open_autodev_prs == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          latest_tag=$(git tag --sort=-v:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || echo "")
          if [ -z "$latest_tag" ]; then
            tag_epoch=0
          else
            # %ct = committer date as Unix epoch — no timezone issues
            tag_epoch=$(git log -1 --format=%ct "$latest_tag" 2>/dev/null || echo 0)
          fi

          export TAG_EPOCH="${tag_epoch}"

          # Count autodev PRs merged/closed after last tag.
          # Use Python for robust epoch comparison (jq fromdateiso8601 behaves
          # inconsistently across GH Actions runner environments).
          gh pr list \
            --repo "${{ github.repository }}" \
            --label autodev-pr \
            --state merged \
            --limit 100 \
            --json mergedAt > /tmp/merged_prs.json
          prs_since=$(python3 - <<'PY'
          import json, datetime
          with open('/tmp/merged_prs.json') as f:
              data = json.load(f)
          import os; tag_epoch = int(os.environ['TAG_EPOCH'])
          count = sum(1 for pr in data
              if pr.get('mergedAt') and
              datetime.datetime.fromisoformat(pr['mergedAt'].replace('Z','+00:00')).timestamp() > tag_epoch)
          print(count)
          PY
          )

          gh pr list \
            --repo "${{ github.repository }}" \
            --label autodev-pr \
            --state closed \
            --limit 100 \
            --json closedAt,mergedAt > /tmp/closed_prs.json
          closed_failed_since=$(python3 - <<'PY'
          import json, datetime
          with open('/tmp/closed_prs.json') as f:
              data = json.load(f)
          import os; tag_epoch = int(os.environ['TAG_EPOCH'])
          count = sum(1 for pr in data
              if pr.get('mergedAt') is None and pr.get('closedAt') and
              datetime.datetime.fromisoformat(pr['closedAt'].replace('Z','+00:00')).timestamp() > tag_epoch)
          print(count)
          PY
          )

          # Days since last tag
          now_epoch=$(date +%s)
          days_since=$(( ( now_epoch - tag_epoch ) / 86400 ))
          seconds_since=$(( now_epoch - tag_epoch ))

          {
            echo "prs_since_tag=${prs_since}"
            echo "days_since_tag=${days_since}"
            echo "latest_tag=${latest_tag}"
          } >> "$GITHUB_OUTPUT"
          echo "PRs since last tag: ${prs_since} merged, ${closed_failed_since} closed-failed, ${days_since} days (${seconds_since}s)"

          # Cooldown: skip if last tag was < 5 min ago (prevents duplicate tags when
          # multiple PR closures trigger auto-loop in rapid succession for the same batch)
          if [ "${seconds_since}" -lt 300 ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "⏭ Cooldown: last tag ${latest_tag} was only ${seconds_since}s ago (< 300s)"
          # Proceed if: enough merges, OR time elapsed, OR entire batch failed (all closed, 0 merged)
          elif [ "$prs_since" -ge "$MIN_PRS_PER_TAG" ] || \
               [ "$days_since" -ge "$MAX_DAYS_BETWEEN_TAGS" ] || \
               { [ "$closed_failed_since" -ge 1 ] && [ "$prs_since" -eq 0 ]; }; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "✅ Batch ready (${prs_since} merged / ${closed_failed_since} failed / ${days_since} days)"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "⏳ Batch not ready (${prs_since}/${MIN_PRS_PER_TAG} merged, ${closed_failed_since} failed, ${days_since}/${MAX_DAYS_BETWEEN_TAGS} days)"
          fi

      # ── Determine bump level from merged commit messages ──────────────────
      - name: Classify bump level (Conventional Commits)
        id: bump
        if: >-
          steps.guard.outputs.open_autodev_prs == '0' &&
          steps.batch.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          LATEST_TAG: ${{ steps.batch.outputs.latest_tag }}
          COMMIT_MESSAGES: ${{ toJson(github.event.commits.*.message) }}
        run: |
          set -euo pipefail
          level=$(python3 - <<'PY'
          import os, re

          msgs = os.environ.get("COMMIT_MESSAGES", "")
          lines = msgs.splitlines()

          has_breaking = any(
              re.search(r'BREAKING[\s_-]CHANGE|feat!:|fix!:|refactor!:|chore!:', ln)
              for ln in lines
          )
          has_minor = any(
              re.match(r'^(feat|refactor)\b', ln)
              for ln in lines
          )

          if has_breaking:
              print("major")
          elif has_minor:
              print("minor")
          else:
              print("patch")
          PY
          )

          echo "level=${level}" >> "$GITHUB_OUTPUT"
          echo "Bump level: ${level}"

      # ── Major: human RFC gate, no auto-tag ───────────────────────────────
      - name: Open RFC issue for major bump (human gate)
        if: >-
          steps.guard.outputs.open_autodev_prs == '0' &&
          steps.batch.outputs.proceed == 'true' &&
          steps.bump.outputs.level == 'major'
        env:
          GH_TOKEN: ${{ github.token }}
          LATEST_TAG: ${{ steps.batch.outputs.latest_tag }}
        run: |
          set -euo pipefail
          current_major=$(echo "${LATEST_TAG}" | grep -oE '^v[0-9]+' | tr -d 'v' || echo "0")
          next_major=$((current_major + 1))
          proposed="v${next_major}.0.0"
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "RFC: major version bump ${LATEST_TAG} → ${proposed}" \
            --label "architecture-audit" \
            --body "$(cat <<EOF
          ## Major Version Bump RFC

          autodev-train detected breaking changes in commits since \`${LATEST_TAG}\`.
          Proposed next version: \`${proposed}\`

          **This requires human approval** per Opus architectural guidance:
          major bump = downstream API contract break → public credibility risk.

          ### Checklist before approving
          - [ ] Review BREAKING CHANGE commits listed below
          - [ ] Confirm downstream consumers notified / migration guide written
          - [ ] Maintainer signs off

          ### To approve
          Comment \`/approve-major ${proposed}\` on this issue.
          The auto-loop will tag and trigger architecture-audit after approval.

          _Opened automatically by auto-loop.yml_
          EOF
          )"
          echo "🛑 Major bump RFC opened — waiting for human approval."

      # ── Patch / minor: compute next version ──────────────────────────────
      - name: Compute next version (patch or minor)
        id: version
        if: >-
          steps.guard.outputs.open_autodev_prs == '0' &&
          steps.batch.outputs.proceed == 'true' &&
          steps.bump.outputs.level != 'major'
        env:
          LATEST_TAG: ${{ steps.batch.outputs.latest_tag }}
          LEVEL: ${{ steps.bump.outputs.level }}
        run: |
          set -euo pipefail
          base="${LATEST_TAG:-v0.0.0}"
          next=$(python3 -c "
          parts = '${base}'.lstrip('v').split('.')
          major, minor, patch = int(parts[0]), int(parts[1]), int(parts[2])
          if '${LEVEL}' == 'minor':
              minor += 1
              patch = 0
          else:
              patch += 1
          print(f'v{major}.{minor}.{patch}')
          " )
          echo "tag=${next}" >> "$GITHUB_OUTPUT"
          echo "Loop: ${base} → ${next} (${LEVEL})"

      # ── Bump package versions before tagging (release-cd reads from tag commit)
      - name: Bump package versions to match new tag
        if: >-
          steps.guard.outputs.open_autodev_prs == '0' &&
          steps.batch.outputs.proceed == 'true' &&
          steps.bump.outputs.level != 'major'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          semver="${TAG#v}"
          git config user.name  "autodev-bot"
          git config user.email "258170091+merchloubna70-dot@users.noreply.github.com"
          # Python SDK
          sed -i "s/^version = \"[^\"]*\"/version = \"${semver}\"/" sdk/python/pyproject.toml
          # TypeScript SDK
          node -e "
          const fs = require('fs');
          const p = JSON.parse(fs.readFileSync('sdk/typescript/package.json','utf8'));
          p.version = '${semver}';
          fs.writeFileSync('sdk/typescript/package.json', JSON.stringify(p,null,2)+'\n');
          "
          git add sdk/python/pyproject.toml sdk/typescript/package.json
          git diff --cached --quiet || git commit -m "chore(release): bump version to ${semver} [skip ci]"
          git push origin HEAD:main
          echo "✅ Bumped package versions to ${semver}"

      # ── Generate release artifact stubs (release-cd requires them at tag) ──
      - name: Generate release artifact stubs
        if: >-
          steps.guard.outputs.open_autodev_prs == '0' &&
          steps.batch.outputs.proceed == 'true' &&
          steps.bump.outputs.level != 'major'
        env:
          TAG: ${{ steps.version.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          semver="${TAG#v}"
          mkdir -p "release/artifacts/${TAG}" "docs/release-notes"

          # Minimal artifact manifest (sha256 filled by release-cd build jobs)
          cat > "release/artifacts/${TAG}/artifact-manifest.json" <<JSON
          {
            "artifacts": [
              {"kind":"python-wheel","name":"attestplane","path":"sdk/python/dist/attestplane-${semver}-py3-none-any.whl","sha256":"pending","size_bytes":0,"version":"${semver}"},
              {"kind":"python-sdist","name":"attestplane","path":"sdk/python/dist/attestplane-${semver}.tar.gz","sha256":"pending","size_bytes":0,"version":"${semver}"},
              {"kind":"npm-tarball","name":"@attestplane/attestplane","path":"sdk/typescript/attestplane-attestplane-${semver}.tgz","sha256":"pending","size_bytes":0,"version":"${semver}"}
            ],
            "checksums_file":"release/artifacts/${TAG}/checksums.sha256",
            "release":"${TAG}",
            "release_notes_file":"docs/release-notes/${TAG}.draft.md",
            "schema":"attestplane_release_artifact_manifest.v1",
            "source_state":{"prepared_by":"auto-loop","target_commit":"${COMMIT_SHA}"},
            "upload_plan_file":"release/artifacts/${TAG}/upload-plan.md"
          }
          JSON

          printf 'pending  sdk/python/dist/attestplane-%s-py3-none-any.whl\n' "${semver}" \
            > "release/artifacts/${TAG}/checksums.sha256"

          cat > "release/artifacts/${TAG}/upload-plan.md" <<MD
          # ${TAG} Release-Asset Upload Plan
          Generated by auto-loop. Artifacts published via release-cd.
          MD

          # Release notes from merged commit messages since last tag
          {
            echo "# ${TAG}"
            echo ""
            echo "\`${TAG}\` is an automated release from autodev-train."
            echo ""
            echo "## Changes"
            git log "$(git describe --tags --abbrev=0 HEAD^)..HEAD" --oneline | sed 's/^/- /'
          } > "docs/release-notes/${TAG}.draft.md"

          git add "release/artifacts/${TAG}/" "docs/release-notes/${TAG}.draft.md"
          git diff --cached --quiet || git commit -m "chore(release): add ${TAG} artifact stubs and release notes [skip ci]"
          git push origin HEAD:main
          echo "✅ Release stubs generated for ${TAG}"

      # ── Create and push tag (after version bump commit) ───────────────────
      - name: Create and push semver tag
        if: >-
          steps.guard.outputs.open_autodev_prs == '0' &&
          steps.batch.outputs.proceed == 'true' &&
          steps.bump.outputs.level != 'major'
        env:
          TAG: ${{ steps.version.outputs.tag }}
          LEVEL: ${{ steps.bump.outputs.level }}
        run: |
          set -euo pipefail
          git tag "$TAG" -m "auto-loop ${LEVEL} bump"
          git push origin "$TAG"
          echo "✅ Tagged ${TAG} (${LEVEL})"

      # ── Trigger architecture-audit ────────────────────────────────────────
      - name: Trigger architecture-audit
        if: >-
          steps.guard.outputs.open_autodev_prs == '0' &&
          steps.batch.outputs.proceed == 'true' &&
          steps.bump.outputs.level != 'major'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          gh workflow run architecture-audit \
            --repo "${{ github.repository }}" \
            --ref main \
            --field milestone_tag="${TAG}"
          echo "✅ architecture-audit triggered for ${TAG}"

      # ── Publish alpha release for patch/minor bumps ───────────────────────
      - name: Publish alpha release via release-cd
        if: >-
          steps.guard.outputs.open_autodev_prs == '0' &&
          steps.batch.outputs.proceed == 'true' &&
          steps.bump.outputs.level != 'major'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          gh workflow run release-cd \
            --repo "${{ github.repository }}" \
            --ref main \
            --field release_tag="${TAG}" \
            --field channel="latest" \
            --field dry_run="false" \
            --field audit_verified="false"
          echo "✅ release-cd triggered for ${TAG} (channel=latest)"
