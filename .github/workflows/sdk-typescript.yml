name: sdk-typescript

on:
  push:
    branches: [main]
    paths:
      - "sdk/typescript/**"
      - "sdk/python/tests/conformance/vectors.json"
      - ".github/workflows/sdk-typescript.yml"
  pull_request:
    branches: [main]
    paths:
      - "sdk/typescript/**"
      - "sdk/python/tests/conformance/vectors.json"
      - ".github/workflows/sdk-typescript.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sdk-typescript-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

defaults:
  run:
    working-directory: sdk/typescript

jobs:
  lint-and-typecheck:
    name: Biome + tsc --noEmit (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["22", "24"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ matrix.node }}
      - name: Install dependencies
        run: npm ci
      - name: Biome (lint + format check)
        run: npm run lint
      - name: TypeScript strict typecheck
        run: npm run typecheck

  test:
    name: vitest (node ${{ matrix.node }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: ["22", "24"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ matrix.node }}
      - name: Install dependencies
        run: npm ci
      - name: Run unit + conformance tests
        run: npm test

  build:
    name: tsc emit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: Build dist/
        run: npm run build
      - name: Confirm dist/ artifacts exist
        run: |
          set -e
          test -f dist/index.js
          test -f dist/index.d.ts
          test -f dist/canonical.js
          test -f dist/hashchain.js
          test -f dist/substrate.js
          test -f dist/types.js
          echo "All expected build outputs present."
