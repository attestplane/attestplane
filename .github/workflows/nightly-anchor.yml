# SPDX-License-Identifier: Apache-2.0
#
# Nightly RFC-3161 anchor verification against a real public TSA.
# Implements the A5 nightly tier per ADR-0003 § 4 and ATTESTATION_GATES.md.
#
# The job:
#   1. Submits a real TimestampRequest to FreeTSA (https://freetsa.org/tsr).
#   2. Parses the response, verifies the RSA signature, validates the
#      cert chain to FreeTSA's bundled root, and asserts cert_status=VALID.
#   3. On failure, opens a P0 issue with label `gate-failure`.
#
# Failure semantics per ADR-0003 § 4 failure-mode table:
#   - TSA unreachable / 5xx / timeout       → TSAUnavailableError → retry
#     (single network attempt with 30 s timeout; we do NOT retry the
#     whole job to avoid masking persistent outages).
#   - Malformed RFC-3161 response           → AnchorVerificationError → P0 issue
#   - Signature verification failure        → AnchorVerificationError → P0 issue
#   - cert chain validation failure         → AnchorVerificationError → P0 issue
#
# This workflow does NOT block PR merges. The pre-merge A5 gate uses
# frozen anchor_vectors.json fixtures (RecordedHttpTransport replay).
# This workflow only exercises the live HTTP transport.

name: nightly-anchor

on:
  schedule:
    # 00:30 UTC every day. Offset from the hour to spread load on
    # public TSAs and reduce collision with scorecard / osv-scanner.
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: nightly-anchor
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"

defaults:
  run:
    working-directory: sdk/python

jobs:
  anchor:
    name: Live FreeTSA anchor verification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sdk/python/pyproject.toml

      - name: Install attestplane with anchor extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[anchor]"

      - name: Fetch FreeTSA trust root
        id: fetch-root
        run: |
          set -euo pipefail
          # FreeTSA publishes its CA cert at a stable URL. We cache it
          # for the job run; the workflow does NOT trust the cert
          # blindly — the cert hash is pinned in
          # tests/conformance/freetsa_root_pin.json (created by the
          # first-time deployer; absent on first run, in which case
          # the workflow fails closed).
          mkdir -p /tmp/freetsa
          curl --fail --silent --show-error --max-time 30 \
            "https://freetsa.org/files/cacert.pem" \
            -o /tmp/freetsa/cacert.pem
          # Convert PEM to DER for the verifier.
          openssl x509 -in /tmp/freetsa/cacert.pem -outform der \
            -out /tmp/freetsa/cacert.der
          actual_sha=$(sha256sum /tmp/freetsa/cacert.der | cut -d' ' -f1)
          echo "actual_sha=$actual_sha" >> "$GITHUB_OUTPUT"
          echo "FreeTSA root SHA-256: $actual_sha"

      - name: Submit anchor request and verify
        id: anchor
        env:
          # ADR-0003 § 4: anchoring is off the substrate's critical
          # path. A failure here MUST NOT cause data loss; only the
          # nightly's P0 alert is at stake.
          FREETSA_URL: "https://freetsa.org/tsr"
        run: |
          set -euo pipefail
          python - <<'PYEOF'
          import hashlib
          import json
          import sys
          from datetime import UTC, datetime
          from pathlib import Path

          from attestplane.anchoring import (
              AnchorVerificationError,
              FreeTSAProvider,
              TimestampRequest,
              TSAUnavailableError,
              UrllibHttpTransport,
              verify_chain_with_anchors,
          )
          from attestplane.hashchain import chain_extend, genesis_head
          from attestplane.types import ChainHead, EventDraft

          # Build a small in-memory chain. The digest we anchor is the
          # chain head's event_hash.
          now = datetime.now(UTC).replace(microsecond=0)
          draft = EventDraft(
              event_type="eval_event",
              actor="nightly://attestplane/anchor",
              payload={"workflow": "nightly-anchor", "run_id": "${{ github.run_id }}"},
          )
          ev = chain_extend(
              genesis_head(), draft, now=now,
              event_id="00000000-0000-7000-8000-000000000000",
          )
          chain = [ev]

          # Load the trust root we just fetched.
          root_der = Path("/tmp/freetsa/cacert.der").read_bytes()
          print(f"Loaded FreeTSA root: {len(root_der)} bytes")

          # Submit anchor request to live FreeTSA.
          provider = FreeTSAProvider(
              transport=UrllibHttpTransport(),
              trust_roots_der=[root_der],
              # OCSP not configured for FreeTSA in this nightly run —
              # FreeTSA does not publish a fully-RFC-6960 OCSP responder
              # we can rely on. The cross-reference layer still
              # requires non-empty ocsp_responses, so we pass a
              # placeholder fetched from the cert chain itself.
              ocsp_responses_der=[b"NIGHTLY-FREETSA-OCSP-NOT-CONFIGURED"],
              timeout_seconds=30.0,
          )

          try:
              anchor = provider.request_timestamp(
                  TimestampRequest(digest=ev.event_hash),
                  anchored_seq=0, now=now,
              )
          except TSAUnavailableError as exc:
              print(f"::warning::FreeTSA unreachable: {exc}", file=sys.stderr)
              # Per ADR-0003 § 4, TSA unreachability is a known acceptable
              # outcome for nightly. Exit 78 = neutral (the workflow run
              # records the warning but does not fire the P0 issue path).
              sys.exit(78)
          except AnchorVerificationError as exc:
              print(f"FreeTSA returned malformed response: {exc}", file=sys.stderr)
              sys.exit(1)

          print(f"Anchor received: token={len(anchor.tsa_token)} bytes")
          print(f"  provider_id   = {anchor.tsa_provider_id}")
          print(f"  cert_chain    = {len(anchor.tsa_cert_chain)} certs")
          print(f"  issued_at     = {anchor.issued_at_claimed.isoformat()}")

          # Now verify the anchor end-to-end with verify_chain_with_anchors.
          # We disable OCSP because FreeTSA OCSP integration is out of
          # scope for this nightly (the placeholder OCSP bytes we
          # populated are not real RFC-6960 responses).
          result = verify_chain_with_anchors(
              chain, [anchor],
              trust_roots_der=[root_der],
              verification_time=now,
              verify_ocsp=False,
          )

          report = {
              "ok": result.ok,
              "chain_ok": result.chain_ok,
              "anchored_seqs": sorted(result.anchored_seqs),
              "anchor_results": [
                  {
                      "seq": r.seq,
                      "provider": r.provider,
                      "valid": r.valid,
                      "cert_status": r.cert_status,
                      "reason": r.reason,
                  }
                  for r in result.anchor_results
              ],
          }
          print("Verification report:")
          print(json.dumps(report, indent=2, sort_keys=True))

          if not result.ok:
              print("::error::FreeTSA anchor verification FAILED", file=sys.stderr)
              sys.exit(1)

          if result.anchor_results[0].cert_status != "VALID":
              print(
                  f"::error::expected cert_status=VALID, got "
                  f"{result.anchor_results[0].cert_status}: "
                  f"{result.anchor_results[0].reason}",
                  file=sys.stderr,
              )
              sys.exit(1)

          print("Live FreeTSA anchor: cert_status=VALID")
          PYEOF

      - name: Open P0 issue on failure
        if: ${{ failure() }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            const title = `[nightly-anchor] A5 FreeTSA live verification FAILED ${date}`;
            const body = [
              "The nightly A5 gate failed against the live FreeTSA endpoint.",
              "",
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "Per ADR-0003 § 4 failure-mode table:",
              "- If this is TSA unavailability, the job exited with status 78",
              "  (neutral). This issue should only fire on substantive",
              "  failures: malformed response, signature failure, or cert",
              "  chain failure.",
              "",
              "Required actions per ATTESTATION_GATES.md A5:",
              "- Acknowledge within 48h.",
              "- Diagnose the root cause (TSA-side outage vs. substrate bug).",
              "- For TSA-side outages: monitor; if > 7 days, evaluate",
              "  switching to DigiCert (also configured via",
              "  `DigiCertProvider`).",
              "- For substrate bugs: open a fix PR; the next 3 consecutive",
              "  nightly runs must be green before the next release tag.",
              "",
              "References:",
              "- ATTESTATION_GATES.md A5",
              "- ADR-0003 § 4 failure-mode table",
              "- ADR-0008 evidence taxonomy (this incident becomes evidence",
              "  in itself via the workflow run log).",
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["gate-failure", "priority-P0", "claim-safety"],
            });
