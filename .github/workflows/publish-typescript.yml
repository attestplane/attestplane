name: publish-typescript

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag'
        required: true
        default: 'alpha'
        type: choice
        options:
          - alpha
          - beta
          - rc
          - latest
      dry_run:
        description: 'Dry run only (no actual publish)'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'sdk-typescript-v*'

permissions:
  contents: read

concurrency:
  group: publish-typescript-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    name: Publish @attestplane/attestplane to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org/'
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Final tests (unit + conformance)
        run: npm test

      - name: Confirm dist/ artifacts before publish
        run: |
          set -e
          test -f dist/index.js
          test -f dist/index.d.ts
          test -f dist/canonical.js
          test -f dist/hashchain.js
          test -f dist/substrate.js
          test -f dist/types.js
          echo "Build artifacts present."

      - name: Validate npm dist-tag policy
        run: |
          set -e
          TAG="${{ inputs.tag || 'alpha' }}"
          VERSION="$(node -p "require('./package.json').version")"
          case "$TAG" in
            alpha|beta|rc|latest) ;;
            *)
              echo "::error::unsupported npm dist-tag '$TAG'"
              exit 1
              ;;
          esac
          if [[ "$TAG" == "latest" && "$VERSION" == *-* ]]; then
            echo "::error::pre-release version $VERSION must not be published with npm latest"
            exit 1
          fi
          if [[ "$VERSION" == *-rc.* && "$TAG" != "rc" ]]; then
            echo "::error::RC versions must publish with npm dist-tag 'rc', got '$TAG'"
            exit 1
          fi
          echo "npm dist-tag policy ok: version=$VERSION tag=$TAG"

      - name: Publish dry-run
        if: ${{ inputs.dry_run == true }}
        run: npm publish --access public --tag ${{ inputs.tag }} --dry-run

      - name: Publish (real)
        if: |
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/sdk-typescript-v')) ||
          (github.event_name == 'workflow_dispatch' && inputs.dry_run != true)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          TAG="${{ inputs.tag || 'alpha' }}"
          unset NODE_AUTH_TOKEN
          export NPM_CONFIG_USERCONFIG="${RUNNER_TEMP}/npm-trusted-publishing.npmrc"
          printf 'registry=https://registry.npmjs.org/\n' > "$NPM_CONFIG_USERCONFIG"
          echo "Publishing @attestplane/attestplane to npm with OIDC trusted publishing and dist-tag '$TAG'"
          npx --yes --package 'npm@^11.5.1' npm --version
          if npx --yes --package 'npm@^11.5.1' npm publish --provenance --access public --tag "$TAG"; then
            exit 0
          fi
          if [[ -z "${NPM_TOKEN:-}" ]]; then
            echo "OIDC trusted publishing failed and NPM_TOKEN is not configured." >&2
            exit 1
          fi
          echo "OIDC trusted publishing failed; retrying with configured npm automation token."
          export NPM_CONFIG_USERCONFIG="${RUNNER_TEMP}/npm-token-publish.npmrc"
          trap 'rm -f "$NPM_CONFIG_USERCONFIG"' EXIT
          {
            printf 'registry=https://registry.npmjs.org/\n'
            printf '//registry.npmjs.org/:_authToken=%s\n' "$NPM_TOKEN"
          } > "$NPM_CONFIG_USERCONFIG"
          chmod 0600 "$NPM_CONFIG_USERCONFIG"
          npm publish --access public --tag "$TAG"
