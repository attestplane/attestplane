name: publish-typescript

on:
  workflow_call:
    inputs:
      tag:
        description: 'npm dist-tag'
        required: true
        type: string
      dry_run:
        description: 'Dry run only (no actual publish)'
        required: false
        default: false
        type: boolean
      release_ref:
        description: 'Git ref or tag to publish from'
        required: false
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag'
        required: true
        default: 'alpha'
        type: choice
        options:
          - alpha
          - beta
          - rc
          - latest
      dry_run:
        description: 'Dry run only (no actual publish)'
        required: false
        default: false
        type: boolean
      release_ref:
        description: 'Git ref or tag to publish from (empty = workflow ref)'
        required: false
        default: ''
        type: string
  push:
    tags:
      - 'sdk-typescript-v*'

permissions:
  contents: read

concurrency:
  group: publish-typescript-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    name: Publish @attestplane/attestplane to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.release_ref || github.ref }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org/'
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Final tests (unit + conformance)
        run: npm test

      - name: Confirm dist/ artifacts before publish
        run: |
          set -e
          test -f dist/index.js
          test -f dist/index.d.ts
          test -f dist/canonical.js
          test -f dist/hashchain.js
          test -f dist/substrate.js
          test -f dist/types.js
          echo "Build artifacts present."

      - name: Validate npm dist-tag policy
        run: |
          set -e
          VERSION="$(node -p "require('./package.json').version")"
          INPUT_TAG="${{ inputs.tag || '' }}"
          if [[ -n "$INPUT_TAG" ]]; then
            TAG="$INPUT_TAG"
          elif [[ "$VERSION" == *-alpha.* ]]; then
            TAG="alpha"
          elif [[ "$VERSION" == *-beta.* ]]; then
            TAG="beta"
          elif [[ "$VERSION" == *-rc.* ]]; then
            TAG="rc"
          else
            TAG="latest"
          fi
          case "$TAG" in
            alpha|beta|rc|latest) ;;
            *)
              echo "::error::unsupported npm dist-tag '$TAG'"
              exit 1
              ;;
          esac
          if [[ "$TAG" == "latest" && "$VERSION" == *-* ]]; then
            echo "::error::pre-release version $VERSION must not be published with npm latest"
            exit 1
          fi
          if [[ "$VERSION" == *-rc.* && "$TAG" != "rc" ]]; then
            echo "::error::RC versions must publish with npm dist-tag 'rc', got '$TAG'"
            exit 1
          fi
          echo "npm dist-tag policy ok: version=$VERSION tag=$TAG"

      - name: Publish dry-run
        if: ${{ inputs.dry_run == true }}
        run: |
          set -e
          VERSION="$(node -p "require('./package.json').version")"
          INPUT_TAG="${{ inputs.tag || '' }}"
          if [[ -n "$INPUT_TAG" ]]; then
            TAG="$INPUT_TAG"
          elif [[ "$VERSION" == *-alpha.* ]]; then
            TAG="alpha"
          elif [[ "$VERSION" == *-beta.* ]]; then
            TAG="beta"
          elif [[ "$VERSION" == *-rc.* ]]; then
            TAG="rc"
          else
            TAG="latest"
          fi
          npm publish --access public --tag "$TAG" --dry-run

      - name: Publish (real)
        if: |
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/sdk-typescript-v')) ||
          (github.event_name == 'workflow_dispatch' && inputs.dry_run != true) ||
          (github.event_name == 'workflow_call' && inputs.dry_run != true)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          VERSION="$(node -p "require('./package.json').version")"
          INPUT_TAG="${{ inputs.tag || '' }}"
          if [[ -n "$INPUT_TAG" ]]; then
            TAG="$INPUT_TAG"
          elif [[ "$VERSION" == *-alpha.* ]]; then
            TAG="alpha"
          elif [[ "$VERSION" == *-beta.* ]]; then
            TAG="beta"
          elif [[ "$VERSION" == *-rc.* ]]; then
            TAG="rc"
          else
            TAG="latest"
          fi
          if npm view "@attestplane/attestplane@${VERSION}" version >/tmp/existing-npm-version 2>/dev/null; then
            EXISTING="$(cat /tmp/existing-npm-version)"
            DIST_TAG_VERSION="$(npm view @attestplane/attestplane "dist-tags.${TAG}" 2>/dev/null || true)"
            if [[ "$EXISTING" == "$VERSION" && "$DIST_TAG_VERSION" == "$VERSION" ]]; then
              echo "npm package already published with expected dist-tag: version=$VERSION tag=$TAG"
              exit 0
            fi
            echo "::error::npm package version already exists but dist-tag is not in the expected state: version=$VERSION tag=$TAG dist-tag-version=$DIST_TAG_VERSION"
            exit 1
          fi
          unset NODE_AUTH_TOKEN
          export NPM_CONFIG_USERCONFIG="${RUNNER_TEMP}/npm-trusted-publishing.npmrc"
          printf 'registry=https://registry.npmjs.org/\n' > "$NPM_CONFIG_USERCONFIG"
          echo "Publishing @attestplane/attestplane to npm with OIDC trusted publishing and dist-tag '$TAG'"
          npx --yes --package 'npm@^11.5.1' npm --version
          if npx --yes --package 'npm@^11.5.1' npm publish --provenance --access public --tag "$TAG"; then
            exit 0
          fi
          if [[ -z "${NPM_TOKEN:-}" ]]; then
            echo "OIDC trusted publishing failed and NPM_TOKEN is not configured." >&2
            exit 1
          fi
          echo "OIDC trusted publishing failed; retrying with configured npm automation token."
          export NPM_CONFIG_USERCONFIG="${RUNNER_TEMP}/npm-token-publish.npmrc"
          trap 'rm -f "$NPM_CONFIG_USERCONFIG"' EXIT
          {
            printf 'registry=https://registry.npmjs.org/\n'
            printf '//registry.npmjs.org/:_authToken=%s\n' "$NPM_TOKEN"
          } > "$NPM_CONFIG_USERCONFIG"
          chmod 0600 "$NPM_CONFIG_USERCONFIG"
          npx --yes --package 'npm@^11.5.1' npm publish --provenance --access public --tag "$TAG"
