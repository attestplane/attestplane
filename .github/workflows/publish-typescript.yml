name: publish-typescript

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag'
        required: true
        default: 'alpha'
        type: choice
        options:
          - alpha
          - beta
          - latest
      dry_run:
        description: 'Dry run only (no actual publish)'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'sdk-typescript-v*'

permissions:
  contents: read

concurrency:
  group: publish-typescript-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    name: Publish @attestplane/attestplane to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    environment:
      name: npm
      url: https://www.npmjs.com/package/@attestplane/attestplane
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Final tests (unit + conformance)
        run: npm test

      - name: Confirm dist/ artifacts before publish
        run: |
          set -e
          test -f dist/index.js
          test -f dist/index.d.ts
          test -f dist/canonical.js
          test -f dist/hashchain.js
          test -f dist/substrate.js
          test -f dist/types.js
          echo "Build artifacts present."

      - name: Publish dry-run
        if: ${{ inputs.dry_run == true }}
        run: npm publish --provenance --access public --tag ${{ inputs.tag }} --dry-run

      - name: Publish (real)
        if: |
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/sdk-typescript-v')) ||
          (github.event_name == 'workflow_dispatch' && inputs.dry_run != true)
        run: |
          set -e
          TAG="${{ inputs.tag || 'alpha' }}"
          echo "Publishing @attestplane/attestplane to npm with dist-tag '$TAG' and provenance attestation"
          npm publish --provenance --access public --tag "$TAG"
