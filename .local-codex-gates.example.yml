default:
  - "python -m compileall scripts"
  - "pytest -q"
claim-safety:
  - "pytest tests/sentinel -q"
  - "pytest tests/release -q"
verifier:
  - "pytest tests/verifier -q"
area:verifier:
  - "env PYTHONPATH=sdk/python/src pytest sdk/python/tests/conformance/test_verifier_conformance.py -q"
  - "env PYTHONPATH=sdk/python/src pytest tests/verifier/test_proof_bundle_schema.py tests/verifier/test_conformance_fixtures.py -q"
area:conformance:
  - "env PYTHONPATH=sdk/python/src pytest sdk/python/tests/conformance/test_verifier_conformance.py -q"
  - "npm run test --workspace sdk/typescript -- verifier.test.ts"
ci:failed:
  - "./scripts/check-schema-hashes.sh"
  - "uv run --project sdk/python ruff check sdk/python/src sdk/python/tests tests"
  - "uv run --project sdk/python mypy --config-file sdk/python/pyproject.toml sdk/python/src/attestplane"
  - "npm --prefix sdk/typescript run lint"
  - "npm --prefix sdk/typescript run typecheck"
  - "uv run --project sdk/python pytest sdk/python/tests tests -q"
test-gap:
  - "pytest tests -q"
docs:
  - "python -m compileall scripts"
  - "python scripts/docs/run_quickstart.py docs/quickstart.md"
release-blocker:
  - "pytest tests/sentinel tests/release -q"
  - "python scripts/docs/run_quickstart.py docs/quickstart.md"
