[default]
extend-ignore-identifiers-re = [
  "[A-Z][a-z]*[0-9]+",
]

[default.extend-words]
attestplane = "attestplane"
# in-toto attestation standard (SLSA / Sigstore ecosystem). Appears as a
# sub-module identifier (e.g. `intoto`, `Intoto`) in code and prose.
intoto = "intoto"
Intoto = "Intoto"
# `mis` as a standalone token appears inside hyphenated compounds like
# `mis-classifying`, `mis-translating` — valid English usage in ADRs.
mis = "mis"
# `anc` is the variable-name shortform for "anchor" in the P3.2 verifier
# (anc_status, anc_summary, anc_check, anc_perf). Not "and" misspelled.
anc = "anc"
# `certifi` is the real Python trust-store package name and appears in generated SBOMs.
certifi = "certifi"
# CNA = CVE Numbering Authority (MITRE CVE Program term). Not "CAN".
CNA = "CNA"
cna = "cna"
CNAs = "CNAs"
# `fpr` is the GPG colon-format field name for "fingerprint" (see
# `gpg --with-colons` output, used in `awk -F: '/^fpr:/ ...'` pipelines) and
# the `<fpr>` placeholder in docs/security/gpg-key-rotation-playbook.md.
fpr = "fpr"

[default.extend-identifiers]
# BaFin = Bundesanstalt fur Finanzdienstleistungsaufsicht (German Federal Financial Supervisory Authority).
# Listed as identifier so typos does not split it into "Ba"+"Fin" and flag "Ba".
BaFin = "BaFin"
# ASN.1 BIT STRING(s) — standard term; typos tokenises `STRINGs` and
# flags the suffix `STRIN`.
STRINGs = "STRINGs"
# Frozen git short-sha in a release-gate report (8afe7b7); typos
# tokenises and reads the leading 3 chars as `afe` → `safe` typo.
# This is a fixed historical hash, not an English word.
"8afe7b7" = "8afe7b7"
# Frozen git short-sha in Issue 92 local release-boundary evidence; typos
# tokenises the leading two chars as `ba` and suggests prose words.
"ba569a9" = "ba569a9"
"ba569a9fa5f0" = "ba569a9fa5f0"

[files]
extend-exclude = [
  "LICENSE",
  "DCO.txt",
  ".lycheeignore",
  "_typos.toml",
  # Compiled artifacts — they mirror src/, no point spell-checking.
  "sdk/typescript/dist/**",
]
